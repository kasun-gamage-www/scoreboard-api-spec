# Redocly configuration — see https://redocly.com/docs/cli/configuration/
# Multi-file source of truth lives under spec/. The root openapi.yaml is a
# generated, self-contained bundle (what Swagger UI and consumers load) —
# regenerate it with `npm run bundle`, do not hand-edit it.
apis:
  scoreboard@v1:
    root: spec/openapi.yaml
    output: openapi.yaml

extends:
  - recommended

rules:
  # Mutating endpoints declare `accessToken` security (admin-gated since the
  # 2026-06 auth hardening), but public read surfaces are intentionally open —
  # don't force a security scheme onto every operation.
  security-defined: off
