components:
  securitySchemes:
    firebaseAuth:
      type: http
      scheme: bearer
      bearerFormat: Firebase ID token
      description: >-
        Firebase ID token obtained client-side via Firebase Authentication and
        sent as `Authorization: Bearer <token>`. Verified server-side with the
        Firebase Admin SDK; admin routes additionally require the `admin: true`
        custom claim.
