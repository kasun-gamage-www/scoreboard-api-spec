get:
  tags:
    - Videos
  operationId: videosList
  summary: List videos (HIDDEN excluded from public lists)
  responses:
    '200':
      description: Videos.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../components/schemas/Video.yaml
post:
  tags:
    - Videos
  operationId: videoCreate
  security:
    - accessToken: []
  summary: Create a video
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/VideoInput.yaml
  responses:
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '201':
      description: Created.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Video.yaml
