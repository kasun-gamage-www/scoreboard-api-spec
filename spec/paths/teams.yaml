get:
  tags:
    - Teams
  operationId: teamsList
  summary: List teams (optional name search)
  parameters:
    - $ref: ../components/parameters/Search.yaml
  responses:
    '200':
      description: Teams (filtered by `search` when provided).
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../components/schemas/Team.yaml
post:
  tags:
    - Teams
  operationId: teamCreate
  security:
    - accessToken: []
  summary: Create a team
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/TeamInput.yaml
  responses:
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '201':
      description: Created.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Team.yaml
