parameters:
  - $ref: ../components/parameters/Slug.yaml
post:
  tags:
    - Articles
  operationId: articleRecordView
  summary: Record a view (read) of an article
  description: >-
    Fire-and-forget view beacon. Clients fire it (e.g. via `sendBeacon`) after
    roughly 10 seconds of dwell on an article, so a recorded view means "read",
    not "landed". Views are deduplicated per client per article over a ~30
    minute window, buffered in the server, and persisted in batches; they feed
    the organic component of the `/articles/popular` ranking and the article's
    all-time view count. The response is always `204` with no body — counted,
    deduplicated, unknown slug or malformed slug are indistinguishable — so
    clients must never retry and cannot probe dedup state. No request body.
  responses:
    '204':
      description: >-
        Accepted. Sent unconditionally (also for deduplicated, dropped or
        unknown-slug beacons); marked `Cache-Control: no-store`.
