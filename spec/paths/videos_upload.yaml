post:
  tags:
    - Media
  operationId: videosUpload
  summary: Presign alias (folder hard-coded to `videos`)
  description: >-
    The `videos` folder accepts both `image/*` and `video/*` content types, with
    a higher size cap than image-only folders.
  security:
    - accessToken: []
  requestBody:
    $ref: ../components/requestBodies/PresignAlias.yaml
  responses:
    '200':
      $ref: ../components/responses/Presign.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
