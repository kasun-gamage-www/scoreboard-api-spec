get:
  tags:
    - Cricket Display
  operationId: cricketSummaries
  summary: Cricket summary cards (mixed past/live/upcoming)
  description: >-
    Served from a 30 s in-memory server cache (single-flight, busted on every
    cricket write) with `Cache-Control: max-age=15`. Ordered LIVE first, then
    RESULT newest-first / UPCOMING soonest-first. The home ticker fetches on
    load and re-polls every 15 s only while a LIVE card is present.
  parameters:
    - name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 10
        maximum: 20
    - name: tournament
      in: query
      required: false
      description: Tournament slug; when omitted, mixes tournaments.
      schema:
        type: string
    - name: include
      in: query
      required: false
      description: Comma-separated subset of PAST,LIVE,UPCOMING.
      schema:
        type: string
        default: PAST,LIVE,UPCOMING
  responses:
    '200':
      description: Cricket summary cards (newest/next-up first).
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../components/schemas/MatchSummary.yaml
