get:
  tags:
    - Articles
  operationId: articlesPopular
  summary: Popular article feed
  description: >-
    Ranks PUBLISHED articles by their editor-set `popularityBoost` (descending),
    tie-broken by `createdAt DESC`. DRAFT and ARCHIVED are excluded. As organic
    popularity signals are added they will be combined with `popularityBoost`;
    the response shape will not change.
  parameters:
    - name: limit
      in: query
      required: false
      description: 1..128. Values > 128 are clamped to 128; < 1 or non-integer → 400.
      schema:
        type: integer
        default: 10
        minimum: 1
        maximum: 128
  responses:
    '200':
      description: Up to `limit` published articles, newest first.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../components/schemas/Article.yaml
    '400':
      description: Invalid limit.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Error.yaml
          example:
            error: Invalid limit
