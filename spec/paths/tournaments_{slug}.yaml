parameters:
  - $ref: ../components/parameters/Slug.yaml
get:
  tags:
    - Tournaments
  operationId: tournamentGet
  summary: Fetch a tournament by slug
  responses:
    '200':
      description: The tournament.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Tournament.yaml
    '404':
      $ref: ../components/responses/NotFoundTournament.yaml
put:
  tags:
    - Tournaments
  operationId: tournamentReplace
  security:
    - firebaseAuth: []
  summary: Full replacement of a tournament
  description: >-
    Send a `slug` in the body to rename the tournament's public identifier; it
    is normalised and made unique, and the change cascades to all references
    (`tournament:<slug>` smart tags in article `tags[]` and the `tournamentSlug`
    FK on matches/other-events). Omit `slug` to leave it tracking `name`.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/TournamentInput.yaml
  responses:
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '200':
      description: Updated.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Tournament.yaml
    '404':
      $ref: ../components/responses/NotFoundTournament.yaml
delete:
  tags:
    - Tournaments
  operationId: tournamentDelete
  security:
    - firebaseAuth: []
  summary: Delete a tournament
  description: >-
    Does NOT cascade. The backend SHOULD reject the delete while referencing
    matches/events exist, or null out `tournamentSlug` on referencing rows.
  responses:
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '204':
      description: Deleted.
