get:
  tags:
    - Clubs
  operationId: clubsList
  summary: List all clubs
  responses:
    '200':
      description: All clubs.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../components/schemas/Club.yaml
post:
  tags:
    - Clubs
  operationId: clubCreate
  security:
    - firebaseAuth: []
  summary: Create a club
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/ClubInput.yaml
  responses:
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '201':
      description: Created.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Club.yaml
