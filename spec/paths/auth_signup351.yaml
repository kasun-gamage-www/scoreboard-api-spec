post:
  tags:
    - Auth
  operationId: authSignup
  summary: Create a new account
  description: >-
    The obfuscated suffix `351` is part of the canonical path. Send the
    plaintext password in `password` (the legacy `passHash` field name is still
    accepted as an alias); the backend bcrypt-hashes it before storing and
    never stores the value verbatim. Accounts are always created with USER
    privilege — `priv` in the request body is ignored; admins are promoted
    out-of-band.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/SignupRequest.yaml
  responses:
    '200':
      description: Account created.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/SignupResponse.yaml
    '400':
      description: Missing fields.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Error.yaml
          example:
            error: Missing fields
    '409':
      description: Username already taken.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Error.yaml
          example:
            error: Username already taken
