get:
  tags:
    - Practice
  operationId: practiceList
  summary: List practice facilities (optional sport / name filters)
  parameters:
    - $ref: ../components/parameters/SportFilter.yaml
    - $ref: ../components/parameters/Search.yaml
  responses:
    '200':
      description: Practice facilities (filtered by `sport` / `search` when provided).
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../components/schemas/PracticeFacility.yaml
post:
  tags:
    - Practice
  operationId: practiceCreate
  security:
    - firebaseAuth: []
  summary: Create a practice facility
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/PracticeFacilityInput.yaml
  responses:
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '201':
      description: Created.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/PracticeFacility.yaml
