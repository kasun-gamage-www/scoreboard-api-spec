parameters:
  - name: uid
    in: path
    required: true
    description: Firebase UID of the target user.
    schema:
      type: string
put:
  tags:
    - Users
  operationId: userSetAdmin
  security:
    - firebaseAuth: []
  summary: Set a user's global tier (admin / super-admin)
  description: >-
    Super-admin only. Sets or clears the `admin` / `superAdmin` custom claims on
    an existing user and revokes their refresh tokens so the change takes effect
    on their next request. Promoting to a global tier clears the user's
    operational role assignments. A super-admin cannot strip their own
    privileges (guards against locking the team out). Reachable with and without
    the `/api` prefix.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/UserAdminInput.yaml
  responses:
    '400':
      description: '`admin` is not a boolean, or the caller tried to demote themselves.'
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Error.yaml
          example:
            error: You cannot revoke your own admin privileges
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '404':
      $ref: ../components/responses/NotFoundUser.yaml
    '200':
      description: Updated user.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/User.yaml
