parameters:
  - $ref: ../components/parameters/Slug.yaml
get:
  tags:
    - Other Events
  operationId: otherEventGet
  summary: Fetch an other event by slug
  responses:
    '200':
      description: The other event.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/OtherEvent.yaml
    '404':
      $ref: ../components/responses/NotFoundOtherEvent.yaml
put:
  tags:
    - Other Events
  operationId: otherEventReplace
  security:
    - accessToken: []
  summary: Full replacement of an other event
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/OtherEventInput.yaml
  responses:
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '200':
      description: Updated.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/OtherEvent.yaml
    '404':
      $ref: ../components/responses/NotFoundOtherEvent.yaml
delete:
  tags:
    - Other Events
  operationId: otherEventDelete
  security:
    - accessToken: []
  summary: Delete an other event
  responses:
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '204':
      description: Deleted.
