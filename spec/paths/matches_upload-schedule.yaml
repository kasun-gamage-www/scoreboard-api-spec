post:
  tags:
    - Matches
  operationId: matchUploadSchedule
  summary: Bulk-import matches from CSV / Excel
  description: >-
    Admin-only. Each row becomes one Match. Rows that fail validation are
    reported in `errors[]` but do not abort the import unless every row fails
    (then 422). The uploaded file is capped at 10 MB (413 beyond that). Column
    order: homeTeamName, awayTeamName, sport, matchType?, scheduledAt?, venues?,
    status?, notes?. `venues` is optional and holds one or more saved venues
    referenced by Venue.slug or (case-insensitive) name, separated by `;` — each
    resolves to a Venue.slug on the match. A row naming an unknown venue is
    skipped with an `Unknown venue: …` error.
  security:
    - firebaseAuth: []
  requestBody:
    required: true
    content:
      multipart/form-data:
        schema:
          $ref: ../components/schemas/ScheduleUploadRequest.yaml
  responses:
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '200':
      description: Import summary.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ScheduleUploadResult.yaml
    '400':
      description: No file uploaded.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Error.yaml
          example:
            error: No file uploaded
    '413':
      description: File exceeds the 10 MB upload cap.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Error.yaml
          example:
            error: File too large
    '422':
      description: All rows failed validation.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ScheduleUploadFailure.yaml
