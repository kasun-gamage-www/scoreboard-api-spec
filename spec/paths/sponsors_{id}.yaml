parameters:
  - name: id
    in: path
    required: true
    description: Opaque sponsor id (numeric or string). Sponsors are NOT slug-addressed.
    schema:
      $ref: ../components/schemas/SponsorId.yaml
delete:
  tags:
    - Sponsors
  operationId: sponsorDelete
  security:
    - firebaseAuth: []
  summary: Delete a sponsor by id
  description: There is intentionally no GET-by-id and no PUT; edits = delete + recreate.
  responses:
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '204':
      description: Deleted.
    '404':
      description: Sponsor not found.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Error.yaml
          example:
            error: Sponsor not found
