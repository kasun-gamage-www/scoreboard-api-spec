get:
  tags:
    - Venues
  operationId: venuesList
  summary: List venues (optional name search)
  parameters:
    - $ref: ../components/parameters/Search.yaml
  responses:
    '200':
      description: Venues (filtered by `search` when provided).
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../components/schemas/Venue.yaml
post:
  tags:
    - Venues
  operationId: venueCreate
  security:
    - firebaseAuth: []
  summary: Create a venue
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/VenueInput.yaml
  responses:
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '201':
      description: Created.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Venue.yaml
