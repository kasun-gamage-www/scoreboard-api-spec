parameters:
  - $ref: ../components/parameters/Slug.yaml
put:
  tags:
    - Matches
  operationId: matchFeaturedSet
  summary: Mark a match as featured
  description: >-
    The backend MUST atomically unset `featured` on any previously featured
    match in the same transaction (at-most-one invariant).
  responses:
    '200':
      description: 'The now-featured match (`featured: true`).'
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Match.yaml
    '404':
      $ref: ../components/responses/NotFoundMatch.yaml
delete:
  tags:
    - Matches
  operationId: matchFeaturedClear
  summary: Clear the featured flag (no-op if not featured)
  responses:
    '204':
      description: Cleared.
