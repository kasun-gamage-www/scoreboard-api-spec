get:
  tags:
    - Golf Display
  operationId: golfSummaries
  summary: Golf summary cards (mixed past/live/upcoming)
  parameters:
    - name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 10
        maximum: 20
    - name: tournament
      in: query
      required: false
      schema:
        type: string
    - name: include
      in: query
      required: false
      description: Comma-separated subset of PAST,LIVE,UPCOMING.
      schema:
        type: string
        default: PAST,LIVE,UPCOMING
  responses:
    '200':
      description: Golf summary cards (newest/next-up first).
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../components/schemas/GolfSummary.yaml
