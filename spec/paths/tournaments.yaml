get:
  tags:
    - Tournaments
  operationId: tournamentsList
  summary: List all tournaments
  description: Every item MUST include `slug` and `name` (used in match/event dropdowns).
  responses:
    '200':
      description: All tournaments.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../components/schemas/Tournament.yaml
post:
  tags:
    - Tournaments
  operationId: tournamentCreate
  security:
    - firebaseAuth: []
  summary: Create a tournament
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/TournamentInput.yaml
  responses:
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '201':
      description: Created.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Tournament.yaml
