parameters:
  - $ref: ../components/parameters/Slug.yaml
get:
  tags:
    - Matches
  operationId: matchGet
  summary: Fetch a match by slug (also used to hydrate the cricket/golf score editors)
  responses:
    '200':
      description: The match.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Match.yaml
    '404':
      $ref: ../components/responses/NotFoundMatch.yaml
put:
  tags:
    - Matches
  operationId: matchReplace
  summary: Full replacement of a match
  description: >-
    Full document replacement — NOT a deep merge. Unknown `details.*` keys (e.g.
    another sport's scoring keys) MUST be preserved verbatim. `featured` is
    ignored here. Cricket-format inheritance from the linked tournament applies
    as on create.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/MatchInput.yaml
  responses:
    '200':
      description: Updated.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Match.yaml
    '404':
      $ref: ../components/responses/NotFoundMatch.yaml
delete:
  tags:
    - Matches
  operationId: matchDelete
  summary: Delete a match
  responses:
    '204':
      description: Deleted.
