get:
  tags:
    - Users
  operationId: userList
  security:
    - accessToken: []
  summary: List users
  description: >-
    Admin-only. Returns all users, newest first. `passHash` is stripped from
    the response. Reachable with and without the `/api` prefix.
  responses:
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '403':
      $ref: ../components/responses/Forbidden.yaml
    '200':
      description: Users (newest first).
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../components/schemas/User.yaml
