type: object
required:
  - title
  - eventType
  - status
properties:
  title:
    type: string
  eventType:
    $ref: ./OtherEventType.yaml
  status:
    allOf:
      - $ref: ./MatchStatus.yaml
    default: SCHEDULED
  sport:
    $ref: ./OtherEventSport.yaml
  tournamentSlug:
    type:
      - string
      - 'null'
  venue:
    type:
      - string
      - 'null'
    description: Primary free-text venue name.
  secondaryVenues:
    type: array
    items:
      type: string
    description: Optional additional free-text venue names for a multi-venue event.
  scheduledAt:
    type:
      - string
      - 'null'
    format: date-time
  organizer:
    type:
      - string
      - 'null'
  description:
    type:
      - string
      - 'null'
