type: object
required:
  - username
  - password
properties:
  username:
    type: string
  password:
    type: string
    description: Plaintext password. The backend bcrypt-hashes it before storing.
  passHash:
    type: string
    deprecated: true
    description: >-
      Legacy alias for `password` (older clients). Treated as the plaintext
      password and bcrypt-hashed server-side — never stored verbatim.
