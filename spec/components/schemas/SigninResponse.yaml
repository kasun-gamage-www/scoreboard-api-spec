type: object
required:
  - token
  - user
properties:
  token:
    type: string
    description: JWT to send as `x-access-token`.
  user:
    type: object
    required:
      - id
      - priv
    properties:
      id:
        type: string
        description: Stable user id.
      priv:
        type: string
        description: >-
          Privilege / role marker (`USER` or `ADMIN`). Mutating endpoints
          require `ADMIN`.
