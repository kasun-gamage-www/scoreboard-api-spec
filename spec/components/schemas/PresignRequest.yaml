type: object
required:
  - filename
  - contentType
  - folder
properties:
  filename:
    type: string
    description: Used only to derive the extension; never echoed into the key path.
    example: sponsor-logo.png
  contentType:
    type: string
    description: MIME type; whitelisted per folder.
    example: image/png
  folder:
    $ref: ./MediaFolder.yaml
  featured:
    type: boolean
    default: false
    description: >-
      Effective only when `folder` is `articles`: stores the object under the
      `articles/featured/` subfolder (the article hero image). Ignored for every
      other folder.
