type: object
required:
  - matchTitle
properties:
  matchTitle:
    type: string
  team1:
    $ref: ./SoccerScoreTeam.yaml
  team2:
    $ref: ./SoccerScoreTeam.yaml
  status:
    type: string
    enum:
      - upcoming
      - live
      - completed
    default: upcoming
  venue:
    type:
      - string
      - 'null'
  matchDate:
    type:
      - string
      - 'null'
    format: date-time
  matchType:
    type: string
    enum:
      - League
      - Cup
      - Friendly
      - International
      - Knockout
      - Other
    default: Other
  result:
    type:
      - string
      - 'null'
