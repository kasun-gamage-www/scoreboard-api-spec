type: object
required:
  - name
  - sport
  - format
  - status
properties:
  name:
    type: string
  slug:
    type: string
    description: >-
      Optional, editable public identifier. When omitted or blank the slug is
      derived from `name` (always so on create). Any value supplied is
      normalised server-side to `[a-z0-9-]` and made unique. On update, changing
      the slug cascades to every reference: the `tournament:<slug>` smart tags in
      article `tags[]` and the `tournamentSlug` FK on matches/other-events are
      rewritten to the new slug.
  sport:
    $ref: ./SportBasic.yaml
  format:
    $ref: ./TournamentFormat.yaml
  status:
    allOf:
      - $ref: ./TournamentStatus.yaml
    default: UPCOMING
  cricketFormat:
    allOf:
      - $ref: ./CricketFormat.yaml
    description: Ignored unless sport = CRICKET.
  description:
    type:
      - string
      - 'null'
  startDate:
    type:
      - string
      - 'null'
    format: date-time
  endDate:
    type:
      - string
      - 'null'
    format: date-time
  venues:
    type: array
    items:
      type: string
    description: Venue.slug references (FK to saved venues); multiple allowed.
  logoUrl:
    type:
      - string
      - 'null'
