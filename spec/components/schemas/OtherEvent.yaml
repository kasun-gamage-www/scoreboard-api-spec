type: object
required:
  - slug
  - title
  - eventType
  - status
  - createdAt
  - updatedAt
properties:
  slug:
    type: string
  title:
    type: string
  eventType:
    $ref: ./OtherEventType.yaml
  status:
    $ref: ./MatchStatus.yaml
  sport:
    $ref: ./OtherEventSport.yaml
  tournamentSlug:
    type:
      - string
      - 'null'
    description: FK to Tournament.slug.
  venue:
    type:
      - string
      - 'null'
    description: Primary free-text venue name, not a FK.
  secondaryVenues:
    type: array
    items:
      type: string
    description: >-
      Optional additional free-text venue names for the rare case an event spans
      more than one venue. Usually empty.
  scheduledAt:
    type:
      - string
      - 'null'
    format: date-time
  organizer:
    type:
      - string
      - 'null'
  description:
    type:
      - string
      - 'null'
  createdAt:
    $ref: ./Timestamp.yaml
  updatedAt:
    $ref: ./Timestamp.yaml
