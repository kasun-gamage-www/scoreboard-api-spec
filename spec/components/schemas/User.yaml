type: object
description: >-
  User record as returned by GET /user, sourced from Firebase Authentication.
required:
  - id
  - username
  - priv
properties:
  id:
    type: string
    description: Firebase UID.
  username:
    type: string
    description: Account email address.
  priv:
    type: string
    default: USER
    description: >-
      Privilege / role marker (`USER` or `ADMIN`), derived from the Firebase
      `admin` custom claim. Mutating endpoints require `ADMIN`.
  createdAt:
    $ref: ./Timestamp.yaml
    description: Firebase account creation time.
