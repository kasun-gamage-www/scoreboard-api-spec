type: object
description: >-
  User record as returned by GET /user, sourced from Firebase Authentication.
required:
  - id
  - username
  - priv
properties:
  id:
    type: string
    description: Firebase UID.
  username:
    type: string
    description: Account email address.
  priv:
    type: string
    default: USER
    enum:
      - USER
      - ADMIN
      - SUPER_ADMIN
    description: >-
      Global privilege tier, derived from the Firebase custom claims:
      `SUPER_ADMIN` (`superAdmin` claim), `ADMIN` (`admin` claim), else `USER`.
      Mutating endpoints require at least `ADMIN`; granting/revoking these tiers
      requires `SUPER_ADMIN`. Operational roles are separate — see
      `GET /user/{uid}/roles`.
  createdAt:
    $ref: ./Timestamp.yaml
    description: Firebase account creation time.
