type: object
description: >-
  Full scorecard page. startTime/matchDate/lastUpdated and innings[].from/to are
  pre-formatted display strings rendered verbatim. videoEmbedUrl must be empty
  or a youtube.com / player.vimeo.com URL.

  Provenance: every populated field is either an admin-entered raw fact,
  derived from one by the server, or (totalViews/liveViewers only) measured
  from real reader traffic — nothing displayed is invented. Fields with no
  input today (stage, city, rightsHolder, lastUpdatedBy, the innings timing
  blocks) are omitted or emitted empty; clients must guard/fall back, and may
  not synthesize values for them.
required:
  - slug
properties:
  slug:
    type: string
  tournament:
    type: string
  seriesName:
    type: string
    description: Currently the tournament slug (no separate series label exists).
  status:
    type: string
    enum:
      - Past
      - Live
      - Upcoming
  stage:
    type: string
    description: Not admin-enterable; currently omitted.
  venue:
    type: string
  city:
    type: string
    description: Not admin-enterable; currently omitted.
  location:
    type: string
    description: Display string.
  overs:
    type: string
    description: Format used per innings.
  startTime:
    type: string
    description: Display string (already formatted).
  matchDate:
    type: string
    description: Display string.
  homeTeam:
    $ref: ./CricketTeamScore.yaml
  awayTeam:
    $ref: ./CricketTeamScore.yaml
  toss:
    type: string
  result:
    type: string
    description: Empty string allowed.
  topBatters:
    type: array
    items:
      $ref: ./CricketBatter.yaml
  topBowlers:
    type: array
    items:
      $ref: ./CricketBowler.yaml
  scorecardInnings:
    type: array
    items:
      $ref: ./ScorecardInnings.yaml
  commentary:
    type: array
    items:
      $ref: ./CommentaryInnings.yaml
  analysis:
    $ref: ./MatchAnalysis.yaml
  heroes:
    $ref: ./MatchHeroes.yaml
  mvp:
    type: array
    items:
      $ref: ./MvpPlayer.yaml
  videoEmbedUrl:
    type: string
    description: >-
      Empty string when no video; else youtube/vimeo host only. No admin input
      today, so always empty.
  streamTitle:
    type: string
    description: Synthesized "{home} Vs {away}" label.
  rightsHolder:
    type: string
    description: Not admin-enterable; currently omitted.
  totalViews:
    type: integer
    description: >-
      All-time deduplicated views of this match page, counted from the
      `/match/cricket/{slug}/view` beacon (fired after ~10 s of dwell).
      Stamped onto the response at send time, so it may trail reality by up to
      the flush window (~1 min) plus the detail cache TTL.
  liveViewers:
    type: integer
    description: >-
      Clients currently polling `/match/cricket/{slug}/live` (distinct clients
      seen within the last ~30 s). Naturally 0 when the match is not LIVE.
      Stamped at send time; not persisted.
  innings:
    type: array
    description: Session timing blocks; not admin-enterable, emitted empty.
    items:
      $ref: ./CricketInningsTiming.yaml
  lastUpdated:
    type: string
    description: Display string.
  lastUpdatedBy:
    type: string
    description: Not admin-enterable; currently omitted.
  available:
    $ref: ./CricketAvailableTabs.yaml
