type: object
required:
  - matchTitle
properties:
  matchTitle:
    type: string
  team1:
    $ref: ./RugbyScoreTeam.yaml
  team2:
    $ref: ./RugbyScoreTeam.yaml
  status:
    type: string
    enum:
      - upcoming
      - live
      - completed
    default: upcoming
  venue:
    type:
      - string
      - 'null'
  matchDate:
    type:
      - string
      - 'null'
    format: date-time
  matchType:
    type: string
    enum:
      - Test
      - Sevens
      - Tens
      - League
      - Union
      - Other
    default: Other
  result:
    type:
      - string
      - 'null'
