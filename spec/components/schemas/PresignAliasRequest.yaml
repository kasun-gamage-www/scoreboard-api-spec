type: object
required:
  - filename
  - contentType
description: >-
  Alias body. `folder` is hard-coded by the endpoint; any client-supplied
  `folder` is ignored.
properties:
  filename:
    type: string
    example: manchester-fc.png
  contentType:
    type: string
    example: image/png
  featured:
    type: boolean
    default: false
    description: >-
      Honored only by the `articles` alias: when `true`, the image is stored
      under the `articles/featured/` subfolder (the article hero image).
      Ignored by every other alias.
