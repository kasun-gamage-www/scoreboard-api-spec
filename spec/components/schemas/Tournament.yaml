type: object
required:
  - slug
  - name
  - sport
  - format
  - status
  - createdAt
  - updatedAt
properties:
  slug:
    type: string
  name:
    type: string
  sport:
    $ref: ./SportBasic.yaml
  format:
    $ref: ./TournamentFormat.yaml
  status:
    $ref: ./TournamentStatus.yaml
  cricketFormat:
    allOf:
      - $ref: ./CricketFormat.yaml
    description: >-
      Only meaningful when sport = CRICKET; inherited by linked matches on
      write.
  description:
    type:
      - string
      - 'null'
  startDate:
    type:
      - string
      - 'null'
    format: date-time
  endDate:
    type:
      - string
      - 'null'
    format: date-time
  venues:
    type: array
    items:
      type: string
    description: >-
      Venue.slug references (FK to saved venues). Replaces the former
      free-text `location`; multiple venues are allowed.
  logoUrl:
    type:
      - string
      - 'null'
    description: Public URL from /tournaments/upload.
  createdAt:
    $ref: ./Timestamp.yaml
  updatedAt:
    $ref: ./Timestamp.yaml
