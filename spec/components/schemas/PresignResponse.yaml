type: object
required:
  - uploadUrl
  - method
  - headers
  - key
  - url
  - maxUploadBytes
  - expiresIn
properties:
  uploadUrl:
    type: string
    format: uri
    description: Short-lived presigned S3 PUT URL (different host from `url`).
  method:
    type: string
    enum:
      - PUT
    description: Always PUT.
  headers:
    type: object
    description: Headers the client MUST send on the PUT.
    additionalProperties:
      type: string
    example:
      Content-Type: image/png
  key:
    type: string
    description: >-
      S3 object key. Most media sits under the `scoreboard/` prefix
      (`scoreboard/<folder>/...`). **Article** images are the exception: they
      live in a dedicated bucket with no `scoreboard/` prefix — `articles/...`,
      or `articles/featured/...` for the hero image.
    example: scoreboard/sponsors/images/2026/05/uuid.png
  url:
    type: string
    format: uri
    description: Canonical public / CDN URL to store on the resource.
  maxUploadBytes:
    type: integer
    description: Hard size limit baked into the signature (default 50 MB).
    example: 52428800
  expiresIn:
    type: integer
    description: Seconds the `uploadUrl` is valid (default 300).
    example: 300
