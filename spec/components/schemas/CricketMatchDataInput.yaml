type: object
description: >-
  Create-or-replace payload for a match's raw cricket data (PUT). Full
  replacement, not a merge. Raw facts only — never send server-assigned fields
  (`over`, `ballInOver`, `isLegal`, `enteredAt`, timestamps) or any derived
  value. Used by the admin match setup, the over-by-over save, and the CSV
  importer.
required:
  - format
  - innings
properties:
  format:
    allOf:
      - $ref: ./CricketFormat.yaml
    description: Required; null not allowed.
  oversLimit:
    type:
      - integer
      - 'null'
    description: Omit/null for format default; set for rain-shortened matches.
  toss:
    oneOf:
      - type: object
        required:
          - wonBy
          - decision
        properties:
          wonBy:
            type: string
            enum:
              - HOME
              - AWAY
          decision:
            type: string
            enum:
              - BAT
              - BOWL
      - type: 'null'
  playerOfMatch:
    type:
      - string
      - 'null'
  resultNote:
    type:
      - string
      - 'null'
  innings:
    type: array
    description: >-
      `seq` must be contiguous from 1. Player names must resolve against the
      match lineups — unresolvable names are rejected (400) for BALL-level
      innings and reported as warnings for OVER-level.
    items:
      $ref: ./CricketInningsData.yaml
