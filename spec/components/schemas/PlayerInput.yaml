type: object
required:
  - name
  - sport
  - status
properties:
  name:
    type: string
  sport:
    $ref: ./SportWithOther.yaml
  status:
    allOf:
      - $ref: ./PlayerStatus.yaml
    default: ACTIVE
  bio:
    type:
      - string
      - 'null'
  team:
    type:
      - string
      - 'null'
    description: >-
      Team name (free text, not a Team.slug FK). The admin UI sources this from
      saved teams with inline create, but any string is accepted.
  position:
    type:
      - string
      - 'null'
  country:
    type:
      - string
      - 'null'
  photoUrl:
    type:
      - string
      - 'null'
  jerseyNumber:
    type:
      - number
      - 'null'
