type: object
required:
  - title
  - author
  - content
  - category
  - status
properties:
  title:
    type: string
  author:
    type: string
  content:
    type: string
    description: HTML body.
  category:
    $ref: ./ArticleCategory.yaml
  sport:
    oneOf:
      - $ref: ./ArticleSport.yaml
      - type: 'null'
    description: >-
      Omit or send `null` for an article that isn't specific to a single sport
      (a general / cross-sport piece). Such an article does not appear in the
      sport-filtered `/articles/latest?sport=…` feeds, only in the common feed.
  status:
    allOf:
      - $ref: ./ArticleStatus.yaml
    default: DRAFT
  summary:
    type:
      - string
      - 'null'
  tags:
    type: array
    items:
      type: string
    description: >-
      A flat list mixing **plain tags** (slugs referencing Tag documents) with
      **smart tags** — namespaced `<type>:<slug>` entity associations. Recognised
      types are `match`, `tournament`, `player`, `team`, `club` and `venue`, and
      the slug is the target record's slug (e.g. `tournament:champions-trophy`).
      See the `Article` schema for the full convention. Both kinds are stored
      verbatim in the same array; the server does not validate that referenced
      records exist.
    example:
      - season-opener
      - tournament:champions-trophy
      - match:india-vs-australia-2026
      - player:virat-kohli
  imageUrl:
    type:
      - string
      - 'null'
  imageYAlignment:
    allOf:
      - $ref: ./ImageYAlignment.yaml
    default: center
  imageYOffset:
    type:
      - number
      - 'null'
    description: Required when imageYAlignment is `custom`; MUST be null otherwise.
  popularityBoost:
    type: number
    default: 0
    description: >-
      Manual popularity weight added on top of organic signals when ranking the
      `/articles/popular` feed. Higher values boost the article; negative values
      demote it. Omitted → defaults to `0`. This field is write-accepted here but
      is **not echoed back** by the public reads (it is server-side
      `select:false`); read the stored value via the admin-only
      `GET /articles/{slug}/full`.
