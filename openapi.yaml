  /videos/upload:
    post:
      tags: [Media]
      operationId: videosUpload
      summary: Presign alias (folder hard-coded to `videos`)
      description: >-
        The `videos` folder accepts both `image/*` and `video/*` content types,
        with a higher size cap than image-only folders.
      security: [{ accessToken: [] }]
      requestBody: { $ref: "#/components/requestBodies/PresignAlias" }
      responses:
        "200": { $ref: "#/components/responses/Presign" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # ============================ ARTICLES ============================
  /articles:
    get:
      tags: [Articles]
      operationId: articlesList
      summary: List all articles
      responses:
        "200":
          description: All articles.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Article" }
    post:
      tags: [Articles]
      operationId: articleCreate
      summary: Create an article
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ArticleInput" }
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Article" }

  /articles/popular:
    get:
      tags: [Articles]
      operationId: articlesPopular
      summary: Popular article feed
      description: >-
        Currently implemented as the most-recently-created PUBLISHED articles,
        newest first (`createdAt DESC`). DRAFT and ARCHIVED are excluded. The
        ranking will change when real popularity signals exist; the shape will not.
      parameters:
        - name: limit
          in: query
          required: false
          description: 1..128. Values > 128 are clamped to 128; < 1 or non-integer → 400.
          schema: { type: integer, default: 10, minimum: 1, maximum: 128 }
      responses:
        "200":
          description: Up to `limit` published articles, newest first.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Article" }
        "400":
          description: Invalid limit.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
              example: { error: "Invalid limit" }

  /articles/{slug}:
    parameters:
      - $ref: "#/components/parameters/Slug"
    get:
      tags: [Articles]
      operationId: articleGet
      summary: Fetch an article by slug (DRAFT/ARCHIVED reachable for admin preview)
      responses:
        "200":
          description: The article.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Article" }
        "404": { $ref: "#/components/responses/NotFoundArticle" }
    put:
      tags: [Articles]
      operationId: articleReplace
      summary: Full replacement of an article
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ArticleInput" }
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Article" }
        "404": { $ref: "#/components/responses/NotFoundArticle" }
    delete:
      tags: [Articles]
      operationId: articleDelete
      summary: Delete an article
      responses:
        "204": { description: Deleted. }

  # ============================ CLUBS ============================
  /clubs:
    get:
      tags: [Clubs]
      operationId: clubsList
      summary: List all clubs
      responses:
        "200":
          description: All clubs.
          content:
