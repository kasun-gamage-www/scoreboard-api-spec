components:
  securitySchemes:
    firebaseAuth:
      type: http
      scheme: bearer
      bearerFormat: Firebase ID token
      description: 'Firebase ID token obtained client-side via Firebase Authentication and sent as `Authorization: Bearer <token>`. Verified server-side with the Firebase Admin SDK; admin routes additionally require the `admin: true` custom claim.'
  schemas:
    HealthStatus:
      type: object
      required:
        - status
        - environment
        - version
        - database
        - uptime
        - timestamp
      properties:
        status:
          type: string
          enum:
            - ok
            - degraded
          description: '`ok` when the database is connected; `degraded` otherwise (HTTP 503).'
        environment:
          type: string
          enum:
            - production
            - development
          description: Reported runtime environment (anything other than `production` reports `development`).
        version:
          type: string
          description: Server `package.json` version.
          example: 1.0.0
        database:
          type: string
          enum:
            - disconnected
            - connected
            - connecting
            - disconnecting
            - unknown
          description: Mongoose connection state.
        uptime:
          type: integer
          description: Process uptime in whole seconds.
          example: 3600
        timestamp:
          type: string
          format: date-time
          description: Server time when the probe was answered.
    Timestamp:
      type: string
      format: date-time
      description: ISO 8601 timestamp.
    User:
      type: object
      description: User record as returned by GET /user, sourced from Firebase Authentication.
      required:
        - id
        - username
        - priv
      properties:
        id:
          type: string
          description: Firebase UID.
        username:
          type: string
          description: Account email address.
        priv:
          type: string
          default: USER
          enum:
            - USER
            - ADMIN
            - SUPER_ADMIN
          description: 'Global privilege tier, derived from the Firebase custom claims: `SUPER_ADMIN` (`superAdmin` claim), `ADMIN` (`admin` claim), else `USER`. Mutating endpoints require at least `ADMIN`; granting/revoking these tiers requires `SUPER_ADMIN`. Operational roles are separate — see `GET /user/{uid}/roles`.'
        createdAt:
          $ref: '#/components/schemas/Timestamp'
          description: Firebase account creation time.
    Error:
      type: object
      description: Project-wide error shape.
      required:
        - error
      properties:
        error:
          type: string
          description: Human-readable message.
        code:
          type: string
          description: Optional machine code.
    UserInput:
      type: object
      description: Payload for creating a Firebase user (POST /user).
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          description: Account email address; must be unique across the project.
        password:
          type: string
          format: password
          minLength: 6
          description: Initial password. Firebase requires at least 6 characters.
        admin:
          type: boolean
          default: false
          description: When true, the new account is granted the `admin` custom claim. Granting a global tier requires the caller to be a super-admin.
        superAdmin:
          type: boolean
          default: false
          description: When true, the new account is granted the `superAdmin` claim (and `admin` alongside it). Super-admin only.
    UserAdminInput:
      type: object
      description: Payload for setting the global tier on a user (PUT /user/{uid}). Super-admin only. Send `admin` and/or `superAdmin`; at least one is required. Promoting to a global tier clears the user's operational role assignments.
      anyOf:
        - required:
            - admin
        - required:
            - superAdmin
      properties:
        admin:
          type: boolean
          description: '`true` grants the `admin` custom claim; `false` clears it (when `superAdmin` is not granted). Refresh tokens are revoked either way.'
        superAdmin:
          type: boolean
          description: '`true` grants the `superAdmin` claim (and `admin` alongside it); `false` clears it.'
    Role:
      type: string
      description: Operational admin-panel role assignable to a user. The global tiers `ADMIN` and `SUPER_ADMIN` are NOT part of this enum — they are Firebase custom claims managed via `PUT /user/{uid}`, and an account is either a global-tier admin or a holder of these operational roles (never both).
      enum:
        - EDITOR
        - WRITER_REPORTER
        - REVIEWER
        - SCORER
        - VENUE_MANAGER
        - CLUB_MANAGER
        - TEAM_MANAGER
        - EVENT_MANAGER
        - PLAYER
    RoleScopeType:
      type:
        - string
        - 'null'
      description: The kind of record a scoped role attaches to. `null` for global roles. The scope's `scopeSlug` references that record's `slug`. `EVENT_MANAGER` scopes to a `TOURNAMENT`; authority over that tournament's matches is derived at enforcement time, not stored as additional assignments.
      enum:
        - VENUE
        - CLUB
        - TEAM
        - TOURNAMENT
        - PLAYER
        - null
    RoleAssignment:
      type: object
      description: An operational role granted to a user, optionally scoped to a specific record. A user may hold many assignments (multiple roles, and/or the same role scoped to several records).
      required:
        - id
        - uid
        - role
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          description: Assignment id.
        uid:
          type: string
          description: Firebase UID of the user the role is granted to.
        role:
          $ref: '#/components/schemas/Role'
        scopeType:
          $ref: '#/components/schemas/RoleScopeType'
        scopeSlug:
          type:
            - string
            - 'null'
          description: Slug of the scoped record (a Venue/Club/Team/Tournament/Player). `null` for global roles.
        createdBy:
          type:
            - string
            - 'null'
          description: Firebase UID of the admin who created the assignment.
        createdAt:
          $ref: '#/components/schemas/Timestamp'
        updatedAt:
          $ref: '#/components/schemas/Timestamp'
    RoleAssignmentInput:
      type: object
      description: Payload to assign an operational role (POST /user/{uid}/roles). Global roles must omit the scope fields; scoped roles require `scopeSlug` referencing an existing record of the role's scope type (`scopeType` is optional and inferred from the role when omitted).
      required:
        - role
      properties:
        role:
          $ref: '#/components/schemas/Role'
        scopeType:
          $ref: '#/components/schemas/RoleScopeType'
        scopeSlug:
          type:
            - string
            - 'null'
          description: Slug of the scoped record. Required for scoped roles.
    MediaFolder:
      type: string
      enum:
        - articles
        - clubs
        - general
        - photos
        - players
        - sponsors
        - teams
        - tournaments
        - venues
        - videos
    PresignRequest:
      type: object
      required:
        - filename
        - contentType
        - folder
      properties:
        filename:
          type: string
          description: Used only to derive the extension; never echoed into the key path.
          example: sponsor-logo.png
        contentType:
          type: string
          description: MIME type; whitelisted per folder.
          example: image/png
        folder:
          $ref: '#/components/schemas/MediaFolder'
        featured:
          type: boolean
          default: false
          description: 'Effective only when `folder` is `articles`: stores the object under the `articles/featured/` subfolder (the article hero image). Ignored for every other folder.'
    PresignResponse:
      type: object
      required:
        - uploadUrl
        - method
        - headers
        - key
        - url
        - maxUploadBytes
        - expiresIn
      properties:
        uploadUrl:
          type: string
          format: uri
          description: Short-lived presigned S3 PUT URL (different host from `url`).
        method:
          type: string
          enum:
            - PUT
          description: Always PUT.
        headers:
          type: object
          description: Headers the client MUST send on the PUT.
          additionalProperties:
            type: string
          example:
            Content-Type: image/png
        key:
          type: string
          description: 'S3 object key. Most media sits under the `scoreboard/` prefix (`scoreboard/<folder>/...`). **Article** images are the exception: they live in a dedicated bucket with no `scoreboard/` prefix — `articles/...`, or `articles/featured/...` for the hero image.'
          example: scoreboard/sponsors/images/2026/05/uuid.png
        url:
          type: string
          format: uri
          description: Canonical public / CDN URL to store on the resource.
        maxUploadBytes:
          type: integer
          description: Hard size limit baked into the signature (default 50 MB).
          example: 52428800
        expiresIn:
          type: integer
          description: Seconds the `uploadUrl` is valid (default 300).
          example: 300
    MediaDeleteRequest:
      type: object
      required:
        - key
      properties:
        key:
          type: string
          description: Must be inside the `scoreboard/` prefix.
          example: scoreboard/sponsors/images/2026/05/uuid.png
    PresignAliasRequest:
      type: object
      required:
        - filename
        - contentType
      description: Alias body. `folder` is hard-coded by the endpoint; any client-supplied `folder` is ignored.
      properties:
        filename:
          type: string
          example: manchester-fc.png
        contentType:
          type: string
          example: image/png
        featured:
          type: boolean
          default: false
          description: 'Honored only by the `articles` alias: when `true`, the image is stored under the `articles/featured/` subfolder (the article hero image). Ignored by every other alias.'
    ArticleCategory:
      type: string
      enum:
        - NEWS
        - MATCH_REPORT
        - FEATURE
        - INTERVIEW
        - OPINION
    ArticleSport:
      type: string
      description: Sports used by Article. Same as SportBasic plus GOLF (no OTHER).
      enum:
        - CRICKET
        - RUGBY
        - SOCCER
        - BADMINTON
        - BOWLING
        - MOTOR_SPORTS
        - BASKETBALL
        - NETBALL
        - VOLLEYBALL
        - CYCLING
        - GOLF
    ArticleStatus:
      type: string
      enum:
        - PUBLISHED
        - DRAFT
        - ARCHIVED
    ImageYAlignment:
      type:
        - string
        - 'null'
      description: Hero crop hint. `imageYOffset` is only set when this is `custom`.
      enum:
        - top
        - center
        - bottom
        - custom
        - null
    Article:
      type: object
      required:
        - slug
        - title
        - author
        - content
        - category
        - sport
        - status
        - createdAt
        - updatedAt
      properties:
        slug:
          type: string
        title:
          type: string
        author:
          type: string
        content:
          type: string
          description: HTML body.
        category:
          $ref: '#/components/schemas/ArticleCategory'
        sport:
          oneOf:
            - $ref: '#/components/schemas/ArticleSport'
            - type: 'null'
          description: '`null` for a general article that isn''t specific to a single sport.'
        status:
          $ref: '#/components/schemas/ArticleStatus'
        summary:
          type:
            - string
            - 'null'
        tags:
          type: array
          items:
            type: string
          description: |-
            A flat list that carries two kinds of entry:
            * **Plain tags** — slugs referencing Tag documents (e.g. `season-opener`).
            * **Smart tags (entity associations)** — namespaced `<type>:<slug>` entries
              that associate the article with another DB record. Recognised types are
              `match`, `tournament`, `player`, `team`, `club` and `venue`; the slug is
              the target record's own slug (e.g. `tournament:champions-trophy`,
              `match:india-vs-australia-2026`). An article may carry any number of
              associations, of any mix of types.

            Both kinds live in the same indexed string array, so associations are directly queryable (e.g. `{ tags: 'tournament:champions-trophy' }`). Because tag slugs are normalised to `[a-z0-9-]`, a plain tag can never collide with a `<type>:` prefix, and `/tags` + `/tags/summary` ignore the namespaced entries (they only count slugs that resolve to a Tag document).
          example:
            - season-opener
            - tournament:champions-trophy
            - match:india-vs-australia-2026
            - player:virat-kohli
        imageUrl:
          type:
            - string
            - 'null'
          description: Public URL from /articles/upload.
        imageYAlignment:
          $ref: '#/components/schemas/ImageYAlignment'
        imageYOffset:
          type:
            - number
            - 'null'
          description: Pixel offset from top; non-null only when imageYAlignment is `custom`.
        createdAt:
          $ref: '#/components/schemas/Timestamp'
        updatedAt:
          $ref: '#/components/schemas/Timestamp'
    ArticleInput:
      type: object
      required:
        - title
        - author
        - content
        - category
        - status
      properties:
        title:
          type: string
        author:
          type: string
        content:
          type: string
          description: HTML body.
        category:
          $ref: '#/components/schemas/ArticleCategory'
        sport:
          oneOf:
            - $ref: '#/components/schemas/ArticleSport'
            - type: 'null'
          description: Omit or send `null` for an article that isn't specific to a single sport (a general / cross-sport piece). Such an article does not appear in the sport-filtered `/articles/latest?sport=…` feeds, only in the common feed.
        status:
          allOf:
            - $ref: '#/components/schemas/ArticleStatus'
          default: DRAFT
        summary:
          type:
            - string
            - 'null'
        tags:
          type: array
          items:
            type: string
          description: A flat list mixing **plain tags** (slugs referencing Tag documents) with **smart tags** — namespaced `<type>:<slug>` entity associations. Recognised types are `match`, `tournament`, `player`, `team`, `club` and `venue`, and the slug is the target record's slug (e.g. `tournament:champions-trophy`). See the `Article` schema for the full convention. Both kinds are stored verbatim in the same array; the server does not validate that referenced records exist.
          example:
            - season-opener
            - tournament:champions-trophy
            - match:india-vs-australia-2026
            - player:virat-kohli
        imageUrl:
          type:
            - string
            - 'null'
        imageYAlignment:
          allOf:
            - $ref: '#/components/schemas/ImageYAlignment'
          default: center
        imageYOffset:
          type:
            - number
            - 'null'
          description: Required when imageYAlignment is `custom`; MUST be null otherwise.
        popularityBoost:
          type: number
          default: 0
          description: Manual popularity weight added on top of organic signals when ranking the `/articles/popular` feed. Higher values boost the article; negative values demote it. Omitted → defaults to `0`. This field is write-accepted here but is **not echoed back** by the public reads (it is server-side `select:false`); read the stored value via the admin-only `GET /articles/{slug}/full`.
    ArticleFull:
      description: 'An article as returned by the admin-only `GET /articles/{slug}/full` read. It is the full `Article` shape plus the server-internal (`select:false`) fields withheld from every public read: the editorial `popularityBoost` weight and the organic view-tracking numbers (`viewCount`, `popularityScore`).'
      allOf:
        - $ref: '#/components/schemas/Article'
        - type: object
          properties:
            popularityBoost:
              type: number
              default: 0
              description: Manual popularity weight set by editors, added on top of any organic popularity signals when ranking the `/articles/popular` feed. Higher values surface the article more prominently; negative values demote it. Denominated in view-equivalents (a boost of 500 ranks like ~500 recent views). Defaults to `0` (no adjustment).
            viewCount:
              type: number
              readOnly: true
              default: 0
              description: 'All-time deduplicated read count, accumulated from the view beacon (`POST /articles/{slug}/view`) since tracking launch. Deliberately lower than a raw pageview metric: a view requires ~10s dwell and is deduplicated per client per ~30 minutes. Server-managed — values sent in create/update bodies are ignored. Reserved for the future public view badge.'
            popularityScore:
              type: number
              readOnly: true
              default: 0
              description: 'Precomputed ranking key for `/articles/popular`: `3 × views(last 2 days) + views(prior 5 days) + popularityBoost`. Refreshed periodically and on article writes. Server-managed — values sent in create/update bodies are ignored.'
    Tag:
      type: object
      required:
        - id
        - name
        - slug
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          description: Opaque tag id (Mongo ObjectId).
        name:
          type: string
        slug:
          type: string
        description:
          type:
            - string
            - 'null'
        articleCount:
          type: integer
          description: Number of articles referencing this tag (server-derived, read-only).
        createdAt:
          $ref: '#/components/schemas/Timestamp'
        updatedAt:
          $ref: '#/components/schemas/Timestamp'
    TagInput:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        slug:
          type: string
          description: Optional. Lowercase letters, numbers and dashes. Derived from `name` when omitted; normalised and de-duplicated server-side.
          pattern: ^[a-z0-9-]*$
        description:
          type:
            - string
            - 'null'
    TagSummary:
      type: object
      required:
        - id
        - name
        - slug
        - articleCount
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        articleCount:
          type: integer
        lastUsedAt:
          oneOf:
            - $ref: '#/components/schemas/Timestamp'
            - type: 'null'
          description: When the most recently updated referencing article was last touched.
    ClubType:
      type: string
      enum:
        - GRASSROOTS
        - SEMI_PRO
        - PROFESSIONAL
    SportWithOther:
      type: string
      description: Sports used by Player, Team, Club (`primarySport`). Adds OTHER.
      enum:
        - CRICKET
        - RUGBY
        - SOCCER
        - BADMINTON
        - BOWLING
        - MOTOR_SPORTS
        - BASKETBALL
        - NETBALL
        - VOLLEYBALL
        - CYCLING
        - OTHER
    ClubStatus:
      type: string
      enum:
        - ACTIVE
        - INACTIVE
        - SUSPENDED
    Club:
      type: object
      required:
        - slug
        - name
        - type
        - primarySport
        - status
        - primaryColor
        - secondaryColor
        - createdAt
        - updatedAt
      properties:
        slug:
          type: string
        name:
          type: string
        type:
          $ref: '#/components/schemas/ClubType'
        primarySport:
          $ref: '#/components/schemas/SportWithOther'
        status:
          $ref: '#/components/schemas/ClubStatus'
        description:
          type:
            - string
            - 'null'
        city:
          type:
            - string
            - 'null'
        country:
          type:
            - string
            - 'null'
        foundedYear:
          type:
            - number
            - 'null'
        website:
          type:
            - string
            - 'null'
        email:
          type:
            - string
            - 'null'
        logoUrl:
          type:
            - string
            - 'null'
          description: Public URL from /clubs/upload.
        primaryColor:
          type: string
          description: Hex color.
          default: '#1976d2'
        secondaryColor:
          type: string
          description: Hex color.
          default: '#ffffff'
        createdAt:
          $ref: '#/components/schemas/Timestamp'
        updatedAt:
          $ref: '#/components/schemas/Timestamp'
    ClubInput:
      type: object
      required:
        - name
        - type
        - primarySport
        - status
      properties:
        name:
          type: string
        type:
          $ref: '#/components/schemas/ClubType'
        primarySport:
          $ref: '#/components/schemas/SportWithOther'
        status:
          allOf:
            - $ref: '#/components/schemas/ClubStatus'
          default: ACTIVE
        description:
          type:
            - string
            - 'null'
        city:
          type:
            - string
            - 'null'
