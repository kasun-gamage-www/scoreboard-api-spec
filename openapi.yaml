  # ============================ PHOTOS ============================
  /photos:
    get:
      tags: [Photos]
      operationId: photosList
      summary: List photos (DRAFT excluded from public lists)
      responses:
        "200":
          description: Photos.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Photo" }
    post:
      tags: [Photos]
