      operationId: articleGetFull
      security:
        - firebaseAuth: []
      summary: Admin read of an article including its server-internal fields
      description: 'Admin-only single-article read used by the CMS edit view. Identical to `GET /articles/{slug}` but additionally returns the fields that are `select:false` on the server and so omitted from every public read: the editorial `popularityBoost`, the all-time `viewCount`, and the computed `popularityScore` (so editors can see the organic numbers behind a ranking). DRAFT and ARCHIVED articles are reachable (admin preview).'
      responses:
        '200':
          description: The article, including `popularityBoost`, `viewCount` and `popularityScore`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleFull'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFoundArticle'
  /articles/{slug}/view:
    parameters:
      - $ref: '#/components/parameters/Slug'
    post:
      tags:
        - Articles
      operationId: articleRecordView
      summary: Record a view (read) of an article
      description: Fire-and-forget view beacon. Clients fire it (e.g. via `sendBeacon`) after roughly 10 seconds of dwell on an article, so a recorded view means "read", not "landed". Views are deduplicated per client per article over a ~30 minute window, buffered in the server, and persisted in batches; they feed the organic component of the `/articles/popular` ranking and the article's all-time view count. The response is always `204` with no body — counted, deduplicated, unknown slug or malformed slug are indistinguishable — so clients must never retry and cannot probe dedup state. No request body.
      responses:
        '204':
          description: 'Accepted. Sent unconditionally (also for deduplicated, dropped or unknown-slug beacons); marked `Cache-Control: no-store`.'
