      operationId: playersList
      summary: List players (search, filter, sort, optional pagination)
      description: Returns a bare `Player[]` array by default. When any of `limit`, `offset` or `page` is supplied the response switches to a paged envelope (`PlayerListResponse`) carrying the matching `total`. `search`, `sport`, `team` and `sortField`/`sortOrder` apply to both shapes.
      parameters:
        - name: search
          in: query
          required: false
          description: Case-insensitive substring matched across `name`, `team`, `position` and `country`.
          schema:
            type: string
        - name: sport
          in: query
          required: false
          description: Exact-match filter on `sport`.
          schema:
            $ref: '#/components/schemas/SportWithOther'
        - name: team
          in: query
          required: false
          description: Exact-match filter on the player's (free-text) `team` name.
          schema:
            type: string
        - name: sortField
          in: query
          required: false
          description: Field to sort by. One of `name`, `sport`, `team`, `position`, `status`, `createdAt`; any other value falls back to the default `createdAt` sort.
          schema:
            type: string
            enum:
              - name
              - sport
              - team
              - position
              - status
              - createdAt
        - name: sortOrder
          in: query
          required: false
          description: '`1`/`asc` ascending (default), `-1`/`desc` descending.'
          schema:
            type: integer
            enum:
              - 1
              - -1
            default: 1
        - name: limit
          in: query
          required: false
          description: Page size. Presence of this (or `offset`/`page`) enables the paged envelope.
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: page
          in: query
          required: false
          description: 1-based page number; an alternative to `offset` (offset = (page - 1) * limit).
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Players matching the search/filters. A bare array by default, or a `PlayerListResponse` envelope when paginated.
          content:
            application/json:
              schema:
                oneOf:
                  - type: array
                    items:
