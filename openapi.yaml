          content:
            application/json:
              schema: { $ref: "#/components/schemas/Photo" }
        "404": { $ref: "#/components/responses/NotFoundPhoto" }
    delete:
      tags: [Photos]
      operationId: photoDelete
      summary: Delete a photo
      responses:
        "204": { description: Deleted. }

  # ============================ VIDEOS ============================
  /videos:
    get:
      tags: [Videos]
      operationId: videosList
      summary: List videos (HIDDEN excluded from public lists)
      responses:
        "200":
          description: Videos.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Video" }
    post:
      tags: [Videos]
      operationId: videoCreate
      summary: Create a video
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/VideoInput" }
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Video" }

  /videos/{slug}:
    parameters:
      - $ref: "#/components/parameters/Slug"
    get:
      tags: [Videos]
      operationId: videoGet
      summary: Fetch a video by slug
      responses:
        "200":
          description: The video.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Video" }
        "404": { $ref: "#/components/responses/NotFoundVideo" }
    put:
      tags: [Videos]
      operationId: videoReplace
      summary: Full replacement of a video
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/VideoInput" }
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Video" }
        "404": { $ref: "#/components/responses/NotFoundVideo" }
    delete:
      tags: [Videos]
      operationId: videoDelete
      summary: Delete a video
      responses:
        "204": { description: Deleted. }

  # ============================ SPONSORS ============================
  /sponsors:
    get:
      tags: [Sponsors]
      operationId: sponsorsList
      summary: List all sponsors
      responses:
        "200":
          description: All sponsors.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Sponsor" }
    post:
      tags: [Sponsors]
      operationId: sponsorCreate
      summary: Create a sponsor
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SponsorInput" }
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Sponsor" }

  /sponsors/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: Opaque sponsor id (numeric or string). Sponsors are NOT slug-addressed.
        schema: { $ref: "#/components/schemas/SponsorId" }
    delete:
      tags: [Sponsors]
      operationId: sponsorDelete
      summary: Delete a sponsor by id
      description: There is intentionally no GET-by-id and no PUT; edits = delete + recreate.
      responses:
        "204": { description: Deleted. }
        "404":
          description: Sponsor not found.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
              example: { error: "Sponsor not found" }

  # ============================ OTHER EVENTS ============================
  /other-events:
    get:
      tags: [Other Events]
      operationId: otherEventsList
      summary: List all other events
      responses:
        "200":
          description: All other events.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/OtherEvent" }
    post:
      tags: [Other Events]
      operationId: otherEventCreate
      summary: Create an other event
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OtherEventInput" }
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OtherEvent" }

  /other-events/{slug}:
    parameters:
      - $ref: "#/components/parameters/Slug"
    get:
      tags: [Other Events]
      operationId: otherEventGet
      summary: Fetch an other event by slug
      responses:
        "200":
          description: The other event.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OtherEvent" }
        "404": { $ref: "#/components/responses/NotFoundOtherEvent" }
    put:
      tags: [Other Events]
      operationId: otherEventReplace
      summary: Full replacement of an other event
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OtherEventInput" }
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OtherEvent" }
        "404": { $ref: "#/components/responses/NotFoundOtherEvent" }
    delete:
      tags: [Other Events]
      operationId: otherEventDelete
      summary: Delete an other event
      responses:
        "204": { description: Deleted. }

  # ============================ MATCHES ============================
  /matches:
    get:
      tags: [Matches]
      operationId: matchesList
      summary: List all matches
      description: "Each match includes `featured: boolean`; at most one is `true`."
      responses:
        "200":
          description: All matches.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Match" }
    post:
      tags: [Matches]
      operationId: matchCreate
      summary: Create a match
      description: >-
        `featured` is read-only here (ignored; defaults to false). If `tournamentSlug`
        is set and `details.cricketFormat` is missing/null, the tournament's
        `cricketFormat` is inherited and persisted onto the match.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MatchInput" }
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Match" }

  /matches/featured:
    get:
      tags: [Matches]
      operationId: matchFeaturedGet
      summary: Get the currently featured match
      responses:
        "200":
          description: The featured match, or null when none is featured.
          content:
            application/json:
              schema:
                oneOf:
                  - { $ref: "#/components/schemas/Match" }
                  - { type: "null" }

  /matches/{slug}:
    parameters:
      - $ref: "#/components/parameters/Slug"
    get:
      tags: [Matches]
      operationId: matchGet
      summary: Fetch a match by slug (also used to hydrate the cricket/golf score editors)
      responses:
        "200":
          description: The match.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Match" }
        "404": { $ref: "#/components/responses/NotFoundMatch" }
    put:
      tags: [Matches]
      operationId: matchReplace
      summary: Full replacement of a match
      description: >-
        Full document replacement — NOT a deep merge. Unknown `details.*` keys
        (e.g. another sport's scoring keys) MUST be preserved verbatim. `featured`
        is ignored here. Cricket-format inheritance from the linked tournament
        applies as on create.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MatchInput" }
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Match" }
        "404": { $ref: "#/components/responses/NotFoundMatch" }
    delete:
      tags: [Matches]
      operationId: matchDelete
      summary: Delete a match
      responses:
        "204": { description: Deleted. }

  /matches/{slug}/featured:
    parameters:
      - $ref: "#/components/parameters/Slug"
    put:
      tags: [Matches]
      operationId: matchFeaturedSet
      summary: Mark a match as featured
      description: >-
        The backend MUST atomically unset `featured` on any previously featured
        match in the same transaction (at-most-one invariant).
      responses:
        "200":
          description: "The now-featured match (`featured: true`)."
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Match" }
        "404": { $ref: "#/components/responses/NotFoundMatch" }
    delete:
      tags: [Matches]
      operationId: matchFeaturedClear
      summary: Clear the featured flag (no-op if not featured)
      responses:
        "204": { description: Cleared. }

  /matches/upload-schedule:
    post:
      tags: [Matches]
      operationId: matchUploadSchedule
      summary: Bulk-import matches from CSV / Excel
      description: >-
        Protected. Each row becomes one Match. Rows that fail validation are
        reported in `errors[]` but do not abort the import unless every row fails
        (then 422). Column order: homeTeamName, awayTeamName, sport, matchType?,
        scheduledAt?, venue?, status?, notes?.
      security: [{ accessToken: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema: { $ref: "#/components/schemas/ScheduleUploadRequest" }
      responses:
        "200":
          description: Import summary.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ScheduleUploadResult" }
        "400":
          description: No file uploaded.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
              example: { error: "No file uploaded" }
        "422":
          description: All rows failed validation.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ScheduleUploadFailure" }

  # ============================ POLLS ============================
  /polls:
    get:
      tags: [Polls]
      operationId: pollsList
      summary: List polls for the public page
      description: >-
        Safe to call without credentials. When a `voterId` cookie or JWT is present,
        `hasVoted` / `votedOptionId` are populated per poll. Send `withCredentials`
        so the voter cookie round-trips.
      parameters:
        - name: filter
          in: query
          required: false
          description: >-
            `latest` (ACTIVE, createdAt DESC), `popular` (ACTIVE, totalVotes DESC then
            createdAt DESC), `closed` (CLOSED + ACTIVE-past-endDate, endDate DESC then
            createdAt DESC). Unknown values → 400.
          schema:
            type: string
            enum: [popular, latest, closed]
            default: latest
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
        - name: offset
          in: query
          required: false
          schema: { type: integer, default: 0, minimum: 0 }
      responses:
        "200":
          description: Paged polls matching the filter.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PollListResponse" }
        "400":
          description: Unknown filter value.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
              example: { error: "Invalid filter" }
    post:
      tags: [Polls]
      operationId: pollCreate
      summary: Create a poll (admin)
      description: >-
        `options` is a flat array of plain strings; the backend assigns each a stable
        `id`. Defaults `status` to DRAFT so the poll is hidden until activated.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PollInput" }
      responses:
        "201":
          description: Created (full Poll shape; totalVotes 0; options have ids).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Poll" }

  /polls/{id}:
    parameters:
      - $ref: "#/components/parameters/PollId"
    get:
      tags: [Polls]
      operationId: pollGet
      summary: Fetch a poll by id
      description: Returns 404 for DRAFT polls or unknown ids.
      responses:
        "200":
          description: The poll.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Poll" }
        "404": { $ref: "#/components/responses/NotFoundPoll" }
    put:
      tags: [Polls]
      operationId: pollReplace
      summary: Replace a poll (admin)
      description: >-
        Options stay a flat string array. The backend preserves existing
        `options[].id`/`votes` for matching (case-insensitive) strings, assigns a
        fresh id (votes 0) to new strings, and drops options no longer present
        (destroying their votes).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PollInput" }
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Poll" }
        "404": { $ref: "#/components/responses/NotFoundPoll" }
    delete:
      tags: [Polls]
      operationId: pollDelete
      summary: Delete a poll (admin)
      description: Also discards all of its votes and dedupe records.
      responses:
        "204": { description: Deleted. }
        "404": { $ref: "#/components/responses/NotFoundPoll" }

  /polls/{id}/vote:
    parameters:
      - $ref: "#/components/parameters/PollId"
    post:
      tags: [Polls]
      operationId: pollVote
      summary: Cast a vote on a poll
      description: >-
        Anonymous voting with best-effort dedupe (JWT > `voterId` cookie > IP+UA
        hash). On the first vote without a cookie, the backend mints one and returns
        it via `Set-Cookie: voterId=...; Max-Age=63072000; SameSite=Lax; HttpOnly;
        Secure`. The increment + dedupe-record MUST be atomic. Changing your vote is
        not supported in v1. A per-IP rate limit (~30/min) is recommended (429).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PollVoteRequest" }
      responses:
        "200":
          description: Updated poll (hasVoted true, votedOptionId set).
          headers:
            Set-Cookie:
              description: voterId cookie, set on the first vote from a given browser.
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Poll" }
        "400":
          description: Invalid optionId.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
              example: { error: "Invalid optionId" }
        "404": { $ref: "#/components/responses/NotFoundPoll" }
        "409":
          description: Poll is closed, or the voter has already voted.
          content:
            application/json:
              schema:
                oneOf:
                  - { $ref: "#/components/schemas/Error" }
                  - { $ref: "#/components/schemas/AlreadyVotedError" }
              examples:
                closed: { value: { error: "Poll is closed" } }
                alreadyVoted:
                  value: { error: "Already voted", votedOptionId: "opt-2" }
        "429":
          description: Too many vote attempts (rate limited).
          headers:
            Retry-After:
              description: Seconds to wait before retrying.
              schema: { type: integer }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  # ==================== MATCH DISPLAY (shared) ====================
  /match/list-match:
    get:
      tags: [Match Display (shared)]
      operationId: matchListMatch
      summary: Schedule feed (past + upcoming) across sports
      description: >-
        Shared by cricket and golf schedule views. The client filters upcoming vs.
        past by `startTime` and picks the next one for the countdown.
      parameters:
        - name: sport
          in: query
          required: false
          description: e.g. CRICKET or GOLF. When omitted, returns all sports.
          schema: { type: string }
        - name: tournament
          in: query
          required: false
          description: Tournament slug.
          schema: { type: string }
        - name: from
          in: query
          required: false
          schema: { type: string, format: date-time }
        - name: to
          in: query
          required: false
          schema: { type: string, format: date-time }
        - name: status
          in: query
          required: false
          schema: { $ref: "#/components/schemas/MatchStatus" }
      responses:
        "200":
          description: Schedule items.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/MatchScheduleItem" }

  /match/past-featured:
    get:
      tags: [Match Display (shared)]
      operationId: matchPastFeatured
      summary: Recent featured match scorecards (carousel + ticker)
      description: >-
        Returns compact summaries. Items are either the cricket-shaped
        `FeaturedMatchSummary` or the golf-shaped `FeaturedGolfSummary`, discriminated
        by `sport` / `scoreboard.format`. Cacheable (`shareReplay(1)` on the client).
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 10 }
        - name: sport
          in: query
          required: false
          description: e.g. GOLF. When omitted, mixes sports.
          schema: { type: string }
      responses:
        "200":
          description: Featured summaries.
          content:
            application/json:
              schema:
                type: array
                items:
                  oneOf:
                    - { $ref: "#/components/schemas/FeaturedMatchSummary" }
                    - { $ref: "#/components/schemas/FeaturedGolfSummary" }

  # ==================== CRICKET DISPLAY ====================
  /match/cricket/summaries:
    get:
      tags: [Cricket Display]
      operationId: cricketSummaries
      summary: Cricket summary cards (mixed past/live/upcoming)
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 10, maximum: 20 }
        - name: tournament
          in: query
          required: false
          description: Tournament slug; when omitted, mixes tournaments.
          schema: { type: string }
        - name: include
          in: query
          required: false
          description: Comma-separated subset of PAST,LIVE,UPCOMING.
          schema: { type: string, default: "PAST,LIVE,UPCOMING" }
      responses:
        "200":
          description: Cricket summary cards (newest/next-up first).
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/MatchSummary" }

  /match/cricket/{slug}:
    parameters:
      - $ref: "#/components/parameters/Slug"
    get:
      tags: [Cricket Display]
      operationId: cricketMatchDetail
      summary: Full cricket match detail (scorecard, commentary, analysis, MVP)
      responses:
        "200":
          description: Cricket match detail.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CricketMatchDetail" }
        "404": { $ref: "#/components/responses/NotFoundMatch" }

  /match/cricket/{slug}/live:
    parameters:
      - $ref: "#/components/parameters/Slug"
    get:
      tags: [Cricket Display]
      operationId: cricketLive
      summary: Lightweight live cricket score (poll/SSE)
      description: "Should set `Cache-Control: no-store`."
      responses:
        "200":
          description: Live cricket score.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CricketLive" }

