    get:
      tags: [Clubs]
      operationId: clubGet
      summary: Fetch a club by slug
      responses:
        "200":
          description: The club.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Club" }
        "404": { $ref: "#/components/responses/NotFoundClub" }
    put:
      tags: [Clubs]
      operationId: clubReplace
      summary: Full replacement of a club
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ClubInput" }
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Club" }
        "404": { $ref: "#/components/responses/NotFoundClub" }
    delete:
      tags: [Clubs]
