  parameters:
    Slug:
      name: slug
      in: path
      required: true
      description: Backend-generated URL-friendly identifier.
      schema:
        type: string
    TagId:
      name: id
      in: path
      required: true
      description: Opaque tag id (Mongo ObjectId).
      schema:
        type: string
    Search:
      name: search
      in: query
      required: false
      description: Case-insensitive substring filter on `name`.
      schema:
        type: string
    SportFilter:
      name: sport
      in: query
      required: false
      description: Filter by primary sport (enum value, e.g. `SOCCER`).
      schema:
        $ref: '#/components/schemas/SportWithOther'
