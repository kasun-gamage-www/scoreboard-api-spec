openapi: 3.1.0
info:
  title: Scoreboard API
  version: 1.0.0
  summary: Unified API for the Scoreboard sports platform (admin CMS + public site).
  description: |
    Consolidated OpenAPI specification for the Scoreboard platform, derived from the
    per-resource markdown specs under `Legacy/`. It covers content management
    (articles, clubs, players, teams, tournaments, venues, photos, videos, sponsors,
    other events), the generic `/matches` resource, sport-specific read surfaces
    (cricket, rugby, soccer & golf), polls, authentication, and the S3 media-presign
    contract.

    ## Per-sport read surfaces
    Cricket, rugby and soccer each expose a public read family. Cricket reuses the
    shared `/match/list-match` and `/match/past-featured` endpoints; rugby and soccer
    use sport-namespaced equivalents (`/match/list-rugby`, `/match/rugby/past-featured`,
    etc.). Golf is specified but not yet implemented in the server. There are also
    deprecated `/api`-only legacy score families per sport (`/cric-scores`,
    `/rugby-scores`, `/soccer-scores`).

    ## Base URL & the `/api` prefix
    The base URL is configured via the `API_BASE_URI` environment variable
    (example: `http://localhost:8081/api`). Endpoints are written here as bare
    resource paths (e.g. `/matches`) which compose onto the base URL.

    Every route is reachable **both with and without** an `/api` prefix
    (`/matches` ≡ `/api/matches`) — **except** the deprecated `/cric-scores`
    family, which is served **only** under the `/api` prefix and is not mirrored
    at the host root.

    ## Authentication
    Protected endpoints require a **Firebase ID token** sent as
    `Authorization: Bearer <token>`. Clients obtain it via Firebase
    Authentication (email/password); the API verifies it with the Firebase
    Admin SDK. This API exposes no sign-in / sign-up endpoints.

    Every mutating endpoint (POST / PUT / DELETE — resource CRUD, media
    presign / delete, the per-resource `/<resource>/upload` aliases, bulk
    schedule import) plus the `/user` family (`GET /user`, `POST /user`,
    `PUT /user/{uid}`, `DELETE /user/{uid}`) requires the token's account to carry the `admin: true`
    custom claim. The first admin is provisioned out-of-band (created in the
    Firebase console, then granted the claim via `scripts/set-admin.js`);
    thereafter an existing admin can create accounts and grant/revoke admin
    through the `/user` endpoints. Public read surfaces and
    `POST /polls/{id}/vote` need no token.

    Failure modes: missing token or a non-admin account → **403**; a malformed,
    expired or revoked token → **401**.

    ## Slugs
    Most resources are addressed by a backend-generated URL-friendly `slug`
    (not a numeric id). Sponsors are the exception and use an opaque `id`.
    Polls use a stable `id` (uuid or slug).

    ## Media flow (presign)
    Image/video assets are uploaded **directly browser → S3** via a short-lived
    presigned `PUT`. The API only signs the URL; file bytes never traverse the API
    server. Every presign response carries two URLs on different hosts: `uploadUrl`
    (the S3 PUT target) and `url` (the canonical public/CDN URL to persist on the
    resource).

    ## Error format
    All non-2xx responses use the project-wide error shape:
    `{ "error": "human-readable message", "code": "OPTIONAL_MACHINE_CODE" }`.
    In production, 5xx bodies carry a generic message instead of the raw
    internal error. Unknown `/api/*` paths return a JSON 404
    (`{ "error": "Not found" }`) rather than the SPA's `index.html`.
  contact:
    name: Scoreboard Platform
  license:
    name: Proprietary
servers:
  - url: '{API_BASE_URI}'
    description: Configurable API base. Default matches the local dev convention.
    variables:
      API_BASE_URI:
        default: http://localhost:8081/api
        description: Root of the API. May or may not include a trailing `/api` segment. All documented paths are reachable with and without an `/api` prefix except the deprecated `/cric-scores` family (which is `/api`-only).
tags:
  - name: Media
    description: S3 presign / delete contract and per-resource upload aliases.
  - name: Articles
    description: Editorial articles (news, match reports, features).
  - name: Tags
    description: Editorial tags (id-addressed) with article usage counts.
  - name: Clubs
    description: Sporting clubs.
  - name: Players
    description: Players (also created inline from the match form).
  - name: Teams
    description: Teams.
  - name: Tournaments
    description: Tournaments / competitions. Source of cricket-format inheritance.
  - name: Venues
    description: Venues (UAE-aware via the `emirate` enum).
  - name: Shops
    description: Sports retailers / pro-shops, scoped to a primary sport.
  - name: Practice
    description: Bookable practice facilities and coaching, scoped to a primary sport.
  - name: Photos
    description: Public photo gallery entries.
  - name: Videos
    description: Videos (YouTube id or hosted file via `source`).
  - name: Sponsors
    description: Lean sponsor list (id-addressed; list/create/delete only).
  - name: Other Events
    description: Non-match calendar items (training, ceremonies, etc.).
  - name: Matches
    description: Generic cross-sport match resource (CRUD, featured flag, bulk import).
  - name: Cricket Input
    description: Admin write surface for raw cricket match data at three detail levels — ball-by-ball, over-by-over, or match totals. Only raw facts are accepted; the server derives everything displayed (scorecards, commentary, analysis, live snapshots, summary cards) on every write.
  - name: Polls
    description: Public reader polls + admin authoring.
  - name: Cricket Display
    description: Public read surfaces for cricket pages.
  - name: Golf Display
    description: Public read surfaces for golf pages.
  - name: Match Display (shared)
    description: Cross-sport public read surfaces (schedule, featured carousel).
  - name: Cricket Legacy
    description: Deprecated `/api/cric-scores` routes. Do not build new code against these.
  - name: Rugby Display
    description: Public read surfaces for rugby pages.
  - name: Soccer Display
    description: Public read surfaces for soccer pages.
  - name: Rugby Legacy
    description: Deprecated `/api/rugby-scores` routes. Do not build new code against these.
  - name: Soccer Legacy
    description: Deprecated `/api/soccer-scores` routes. Do not build new code against these.
  - name: Users
    description: Admin user management — list, create, and set global tier (admin/super-admin).
  - name: Roles
    description: Operational role assignments for admin-panel users (optionally scoped to a record).
  - name: System
    description: Operational endpoints (unauthenticated health probe).
paths:
  /health:
    get:
      tags:
        - System
      operationId: healthGet
      summary: Liveness / readiness probe
      description: |-
        Unauthenticated health probe for load balancers and uptime monitors. Returns `200` while the database is connected and `503` (still a JSON body) while it is not, so the load balancer pulls the instance out of rotation instead of routing traffic to a half-up server.

        **`/api`-only:** unlike most routes, this is served **only** under the `/api` prefix (`/api/health`) — it is not mirrored at the host root.
      responses:
        '200':
          description: Service healthy (database connected).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
        '503':
          description: Service degraded (database not connected). Same body shape; `status` is `degraded`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
  /user:
    get:
      tags:
        - Users
      operationId: userList
      security:
        - firebaseAuth: []
      summary: List users
      description: Admin-only. Lists Firebase users, newest first. `username` carries the account email and `priv` is derived from the `admin` custom claim. Reachable with and without the `/api` prefix.
      responses:
        '200':
          description: Users (newest first).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags:
        - Users
      operationId: userCreate
      security:
        - firebaseAuth: []
      summary: Create a user
      description: Admin-only. Provisions a new Firebase account (email + password). When `admin` is true the account also receives the `admin` custom claim, so it can administer immediately on first sign-in. Reachable with and without the `/api` prefix.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserInput'
      responses:
        '201':
          description: Created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Missing/invalid field, or a Firebase rejection (e.g. duplicate email, password shorter than 6 characters).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: The email address is already in use by another account.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /user/{uid}:
    parameters:
      - name: uid
        in: path
        required: true
        description: Firebase UID of the target user.
        schema:
          type: string
    put:
      tags:
        - Users
      operationId: userSetAdmin
      security:
        - firebaseAuth: []
      summary: Set a user's global tier (admin / super-admin)
      description: Super-admin only. Sets or clears the `admin` / `superAdmin` custom claims on an existing user and revokes their refresh tokens so the change takes effect on their next request. Promoting to a global tier clears the user's operational role assignments. A super-admin cannot strip their own privileges (guards against locking the team out). Reachable with and without the `/api` prefix.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserAdminInput'
      responses:
        '200':
          description: Updated user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: '`admin` is not a boolean, or the caller tried to demote themselves.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: You cannot revoke your own admin privileges
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFoundUser'
    delete:
      tags:
        - Users
      operationId: userDelete
      security:
        - firebaseAuth: []
      summary: Delete a user
      description: Admin-only. Permanently deletes the Firebase account and removes any operational role assignments it held. A caller cannot delete their own account (guards against locking themselves out mid-session). Reachable with and without the `/api` prefix.
      responses:
        '204':
          description: Deleted.
        '400':
          description: The caller tried to delete their own account.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: You cannot delete your own account
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFoundUser'
  /user/{uid}/roles:
    parameters:
      - name: uid
        in: path
        required: true
        description: Firebase UID of the target user.
        schema:
          type: string
    get:
      tags:
        - Roles
      operationId: userRolesList
      security:
        - firebaseAuth: []
      summary: List a user's role assignments
      description: Admin-only. Lists the operational role assignments granted to the user.
      responses:
        '200':
          description: The user's role assignments.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RoleAssignment'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags:
        - Roles
      operationId: userRoleAssign
      security:
        - firebaseAuth: []
      summary: Assign a role to a user
      description: Admin-only (admins and super-admins). Grants an operational role, optionally scoped to a specific record. Global roles must omit the scope fields; scoped roles require an existing record for `scopeSlug`. Global-tier accounts (admin/super-admin) cannot hold operational roles.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleAssignmentInput'
      responses:
        '201':
          description: Created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleAssignment'
        '400':
          description: Invalid role, scope mismatch (global role with a scope, or scoped role without/with an unknown record), or the target is a global-tier admin.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: VENUE_MANAGER requires a venue (scopeSlug)
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFoundUser'
        '409':
          description: The same role+scope is already assigned to this user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: This role is already assigned
  /user/{uid}/roles/{id}:
    parameters:
      - name: uid
        in: path
        required: true
        description: Firebase UID of the target user.
        schema:
          type: string
      - name: id
        in: path
        required: true
        description: Role assignment id.
        schema:
          type: string
    delete:
      tags:
        - Roles
      operationId: userRoleRemove
      security:
        - firebaseAuth: []
      summary: Remove a role assignment
      description: Admin-only. Removes a single operational role assignment from the user.
      responses:
        '204':
          description: Deleted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFoundRoleAssignment'
  /media/presign:
    post:
      tags:
        - Media
      operationId: mediaPresign
      summary: Presign an S3 PUT for a direct browser upload
      description: Admin-only. Returns a short-lived presigned S3 `PUT` plus the canonical public URL to persist. The signature pins content-type and a max byte size, so S3 itself rejects oversize / content-type-swapped uploads.
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PresignRequest'
      responses:
        '200':
          description: Presigned upload details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresignResponse'
        '400':
          description: Invalid contentType / folder / filename.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                contentType:
                  value:
                    error: Invalid contentType
                folder:
                  value:
                    error: Invalid folder
                filename:
                  value:
                    error: Invalid filename
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /media:
    delete:
      tags:
        - Media
      operationId: mediaDelete
      summary: Delete an uploaded object by key
      description: Admin-only. The backend MUST reject any `key` outside the `scoreboard/` prefix with 400, preventing deletion of arbitrary bucket objects.
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MediaDeleteRequest'
      responses:
        '204':
          description: Deleted.
        '400':
          description: Key outside the `scoreboard/` prefix.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Key outside scoreboard/ prefix
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /articles/upload:
    post:
      tags:
        - Media
      operationId: articlesUpload
      summary: Presign alias (folder hard-coded to `articles`)
      description: Same shape as `/media/presign`; any client `folder` is ignored.
      security:
        - firebaseAuth: []
      requestBody:
        $ref: '#/components/requestBodies/PresignAlias'
      responses:
        '200':
          $ref: '#/components/responses/Presign'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /clubs/upload:
    post:
      tags:
        - Media
      operationId: clubsUpload
      summary: Presign alias (folder hard-coded to `clubs`)
      security:
        - firebaseAuth: []
      requestBody:
        $ref: '#/components/requestBodies/PresignAlias'
      responses:
        '200':
          $ref: '#/components/responses/Presign'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /photos/upload:
    post:
      tags:
        - Media
      operationId: photosUpload
      summary: Presign alias (folder hard-coded to `photos`)
      security:
        - firebaseAuth: []
      requestBody:
        $ref: '#/components/requestBodies/PresignAlias'
      responses:
        '200':
          $ref: '#/components/responses/Presign'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /players/upload:
    post:
      tags:
        - Media
      operationId: playersUpload
      summary: Presign alias (folder hard-coded to `players`)
      security:
        - firebaseAuth: []
      requestBody:
        $ref: '#/components/requestBodies/PresignAlias'
      responses:
        '200':
          $ref: '#/components/responses/Presign'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /sponsors/upload:
    post:
      tags:
        - Media
      operationId: sponsorsUpload
      summary: Presign alias (folder hard-coded to `sponsors`)
      security:
        - firebaseAuth: []
      requestBody:
        $ref: '#/components/requestBodies/PresignAlias'
      responses:
        '200':
          $ref: '#/components/responses/Presign'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /teams/upload:
    post:
      tags:
        - Media
      operationId: teamsUpload
      summary: Presign alias (folder hard-coded to `teams`)
      security:
        - firebaseAuth: []
      requestBody:
        $ref: '#/components/requestBodies/PresignAlias'
      responses:
        '200':
          $ref: '#/components/responses/Presign'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /tournaments/upload:
    post:
      tags:
        - Media
      operationId: tournamentsUpload
      summary: Presign alias (folder hard-coded to `tournaments`)
      security:
        - firebaseAuth: []
      requestBody:
        $ref: '#/components/requestBodies/PresignAlias'
      responses:
        '200':
          $ref: '#/components/responses/Presign'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /venues/upload:
    post:
      tags:
        - Media
      operationId: venuesUpload
      summary: Presign alias (folder hard-coded to `venues`)
      security:
        - firebaseAuth: []
      requestBody:
        $ref: '#/components/requestBodies/PresignAlias'
      responses:
        '200':
          $ref: '#/components/responses/Presign'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /shops/upload:
    post:
      tags:
        - Media
      operationId: shopsUpload
      summary: Presign alias (folder hard-coded to `shops`)
      security:
        - firebaseAuth: []
      requestBody:
        $ref: '#/components/requestBodies/PresignAlias'
      responses:
        '200':
          $ref: '#/components/responses/Presign'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /practice/upload:
    post:
      tags:
        - Media
      operationId: practiceUpload
      summary: Presign alias (folder hard-coded to `practice`)
      security:
        - firebaseAuth: []
      requestBody:
        $ref: '#/components/requestBodies/PresignAlias'
      responses:
        '200':
          $ref: '#/components/responses/Presign'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /videos/upload:
    post:
      tags:
        - Media
      operationId: videosUpload
      summary: Presign alias (folder hard-coded to `videos`)
      description: The `videos` folder accepts both `image/*` and `video/*` content types, with a higher size cap than image-only folders.
      security:
        - firebaseAuth: []
      requestBody:
        $ref: '#/components/requestBodies/PresignAlias'
      responses:
        '200':
          $ref: '#/components/responses/Presign'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /articles:
    get:
      tags:
        - Articles
      operationId: articlesList
      summary: List all articles
      description: Default order is newest first (`createdAt DESC`). `sortField` switches to a whitelisted server-side sort — `popularityScore` ranks by the same precomputed popularity used by `/articles/popular` (the score itself is `select:false` and not echoed back). Non-`createdAt` sorts are tie-broken by `createdAt DESC`; an unknown `sortField` is ignored and the default order applies.
      parameters:
        - name: sortField
          in: query
          required: false
          description: Whitelisted sort field. Unknown values fall back to the default sort.
          schema:
            type: string
            enum:
              - createdAt
              - popularityScore
        - name: sortOrder
          in: query
          required: false
          description: '`desc`/`-1` for descending; anything else sorts ascending.'
          schema:
            type: string
            enum:
              - asc
              - desc
              - '1'
              - '-1'
      responses:
        '200':
          description: All articles, ordered as requested.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Article'
    post:
      tags:
        - Articles
      operationId: articleCreate
      security:
        - firebaseAuth: []
      summary: Create an article
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArticleInput'
      responses:
        '201':
          description: Created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Article'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /articles/popular:
    get:
      tags:
        - Articles
      operationId: articlesPopular
      summary: Popular article feed
      description: 'Ranks PUBLISHED articles by `popularityScore` (descending), tie-broken by `createdAt DESC`. DRAFT and ARCHIVED are excluded. The score is a server-side blend of organic views and the editorial boost, recomputed periodically and on article writes: `3 × views(last 2 days) + views(prior 5 days) + popularityBoost`, where views are beacon-reported reads (`POST /articles/{slug}/view`) deduplicated per client per ~30 minutes. `popularityBoost` is therefore denominated in view-equivalents: a boost of 500 ranks like ~500 recent views. The score is `select:false` on the server, so it does not appear in this response.'
      parameters:
        - name: limit
          in: query
          required: false
          description: 1..128. Values > 128 are clamped to 128; < 1 or non-integer → 400.
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 128
        - name: sport
          in: query
          required: false
          description: Narrows the ranking to a single sport before `limit` is applied. Case-insensitive and hyphen-tolerant (`motor-sports` and `MOTOR_SPORTS` are equivalent); normalised to the `ArticleSport` enum server-side. An unknown or unmatched `sport` yields an empty array (not an error), matching `/articles/latest`. Omit for the global ranking.
          schema:
            $ref: '#/components/schemas/ArticleSport'
      responses:
        '200':
          description: Up to `limit` published articles, most popular first.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Article'
        '400':
          description: Invalid limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Invalid limit
  /articles/popular/home:
    get:
      tags:
        - Articles
      operationId: articlesPopularHome
      summary: Home-page popular rail
      description: 'The 5 most popular PUBLISHED articles **excluding** whatever the common `/articles/latest` feed currently shows, so the home page''s Latest and Popular sections never repeat an article. Ordered by `popularityScore DESC`, tie-broken by `createdAt DESC`. The count is server-fixed (no `limit` param) — this feed exists only for the home page. Served through a server-side cache: article writes invalidate immediately, while popularity drift alone is picked up when the ~6-hour TTL lapses, so the rail reshuffles at most a few times a day. Also browser-cacheable (same TTL as `/articles/latest`).'
      responses:
        '200':
          description: Up to 5 published articles, most popular first, disjoint from the common latest feed. Empty if nothing qualifies.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Article'
  /articles/latest:
    get:
      tags:
        - Articles
      operationId: articlesLatest
      summary: Latest article feed (common + per-sport)
      description: |-
        The most-recently-created PUBLISHED articles, newest first (`createdAt DESC`). DRAFT and ARCHIVED are excluded. Without `sport` this is the common feed across all sports; with `sport` it is narrowed to that one sport.

        The number returned is **fixed by the server** (currently 4) and is the same for the common and per-sport feeds — there is no client `limit` override. An unknown or unmatched `sport` yields an empty array (not an error), matching the other sport filters on the platform.

        **Caching.** Responses are browser-cacheable (`Cache-Control: public, max-age=60`) and may additionally be served from a server-side cache that is invalidated on every article create/update/delete — so a publish is reflected on the next uncached read, and the only residual staleness is the browser's up-to-~1-minute window.
      parameters:
        - name: sport
          in: query
          required: false
          description: Narrows the feed to a single sport. Case-insensitive and hyphen-tolerant (`motor-sports` and `MOTOR_SPORTS` are equivalent); normalised to the `ArticleSport` enum server-side. Omit for the common cross-sport feed.
          schema:
            $ref: '#/components/schemas/ArticleSport'
      responses:
        '200':
          description: The latest published articles (at most the server-fixed count), newest first. Empty if none match.
          headers:
            Cache-Control:
              description: Browser cache directive; served off the ELB (no shared cache).
              schema:
                type: string
                example: public, max-age=60
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Article'
  /articles/{slug}:
    parameters:
