          default: SCHEDULED
        tournamentSlug:
          type:
            - string
            - 'null'
        matchType:
          $ref: '#/components/schemas/MatchType'
        venue:
          type:
            - string
            - 'null'
          description: Primary Venue.slug reference (FK to saved venues).
        secondaryVenues:
          type: array
          items:
            type: string
          description: Optional additional Venue.slug references for the rare multi-venue match.
        scheduledAt:
          type:
            - string
            - 'null'
          format: date-time
        referee:
          type:
            - string
            - 'null'
        notes:
          type:
            - string
            - 'null'
        homeScore:
          type:
            - number
            - 'null'
        awayScore:
