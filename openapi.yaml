  /matches/upload-schedule:
    post:
      tags:
        - Matches
      operationId: matchUploadSchedule
      summary: Bulk-import matches from CSV / Excel
      description: 'Admin-only. Each row becomes one Match. Rows that fail validation are reported in `errors[]` but do not abort the import unless every row fails (then 422). The uploaded file is capped at 10 MB (413 beyond that). Column order: homeTeamName, awayTeamName, sport, matchType?, scheduledAt?, venues?, status?, notes?. `venues` is optional and holds one or more saved venues referenced by Venue.slug or (case-insensitive) name, separated by `;`. The first resolves to the match''s primary `venue`; any additional venues (rare) populate `secondaryVenues`. A row naming an unknown venue is skipped with an `Unknown venue: …` error.'
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ScheduleUploadRequest'
      responses:
        '200':
          description: Import summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleUploadResult'
        '400':
          description: No file uploaded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: No file uploaded
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '413':
          description: File exceeds the 10 MB upload cap.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: File too large
        '422':
          description: All rows failed validation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleUploadFailure'
  /matches/{slug}/cricket-data:
    parameters:
      - $ref: '#/components/parameters/Slug'
    get:
      tags:
        - Cricket Input
      operationId: cricketDataGet
      security:
        - firebaseAuth: []
      summary: Fetch a match's raw cricket entry data (hydrates the score editor)
      description: Returns the stored raw facts plus the current server-derived live snapshot. 404 when the match is unknown — or exists but has no cricket data yet (implicitly MATCH-level; the editor then offers match setup).
      responses:
        '200':
          description: Raw cricket data + live snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CricketMatchDataResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Match unknown, not a cricket match, or no cricket data yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: No cricket data for this match
    put:
      tags:
        - Cricket Input
      operationId: cricketDataReplace
      security:
        - firebaseAuth: []
      summary: Create or fully replace a match's raw cricket data
      description: Full replacement, not a merge — used by the admin match setup, the over-by-over save and the CSV importer. On every accepted write the server re-derives all display surfaces (summary card, scorecard, commentary, analysis, live), mirrors innings totals onto `Match.details`, updates the in-memory live snapshot and busts the public cricket caches before responding. Impossible states (an 11th wicket, a name not in the lineup on a BALL-level innings, non-contiguous innings `seq`) are rejected with 400.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CricketMatchDataInput'
      responses:
        '200':
          description: Stored data + fresh live snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CricketMatchDataResponse'
        '400':
          description: Validation or derivation error (impossible state).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: 'innings 1: wicket 11 is impossible'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFoundMatch'
  /matches/{slug}/cricket-data/balls:
    parameters:
      - $ref: '#/components/parameters/Slug'
    post:
      tags:
        - Cricket Input
      operationId: cricketDataAppendBall
      security:
        - firebaseAuth: []
      summary: Append one delivery (live ball-by-ball entry)
      description: 'Appends to the innings'' delivery sequence. The server assigns `over`/`ballInOver` from the count of legal balls, computes `isLegal`, persists before acknowledging, re-derives all display surfaces and updates the in-memory live snapshot synchronously — guest `/match/cricket/{slug}/live` polls see the ball immediately. Optimistic concurrency: `expectedBallCount` must equal the server''s current delivery count for the innings, else 409 and nothing is written.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CricketBallInput'
      responses:
        '200':
          description: Ball stored.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CricketBallResponse'
        '400':
          description: Validation or derivation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Match unknown or has no cricket data / no such innings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Stale `expectedBallCount` — re-hydrate and retry.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CricketBallConflict'
  /matches/{slug}/cricket-data/balls/last:
    parameters:
      - $ref: '#/components/parameters/Slug'
    delete:
      tags:
        - Cricket Input
      operationId: cricketDataUndoBall
      security:
        - firebaseAuth: []
      summary: Undo the most recent delivery of an innings
      description: Pops the innings' last delivery, re-derives all display surfaces and updates the live snapshot — a wicket undo restores the batter, an over-boundary undo restores the previous over. Guarded by the same optimistic-concurrency check as append (`expected` = the client's current delivery count).
      parameters:
        - name: innings
          in: query
          required: true
          description: Innings `seq` to undo from.
          schema:
            type: integer
            minimum: 1
        - name: expected
          in: query
          required: true
          description: Client's current delivery count for the innings.
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Ball removed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CricketBallResponse'
        '400':
          description: Nothing to undo, or validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Match unknown or has no cricket data / no such innings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Stale `expected` count — re-hydrate and retry.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CricketBallConflict'
  /matches/{slug}/cricket-data/state:
    parameters:
      - $ref: '#/components/parameters/Slug'
    patch:
      tags:
        - Cricket Input
      operationId: cricketDataPatchState
      security:
        - firebaseAuth: []
      summary: Patch match/innings live state (toss, status, innings lifecycle, crease)
      description: Send any subset of the patch fields — set the toss, start or close an innings, repoint the crease, name the player of the match, or transition the parent Match status (LIVE to start, COMPLETED to finalise; COMPLETED also produces the derived result label and schedules live-snapshot eviction). Every accepted patch re-derives the display surfaces and busts the public cricket caches.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CricketStatePatch'
      responses:
        '200':
          description: Updated data + fresh live snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CricketMatchDataResponse'
        '400':
          description: Validation or derivation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFoundMatch'
  /matches/{slug}/cricket-data/upload:
    parameters:
      - $ref: '#/components/parameters/Slug'
    post:
      tags:
        - Cricket Input
      operationId: cricketDataUpload
      security:
        - firebaseAuth: []
      summary: Import a match's cricket data from CSV / Excel (single template)
      description: 'Admin-only. One template covers finished and ongoing matches at all three detail levels. Fixed header: `rowType,key,value,innings,battingTeam,over, ball,striker,nonStriker,bowler,runsOffBat,extraType,extraRuns,wicketType, playerOut,fielder,runs,wickets,overs`. Row kinds: META (key/value pairs — format, status, tossWonBy, tossDecision, batFirst, playerOfMatch, resultNote), PLAYER (adds lineup players missing from the match), INNINGS (one per innings, declares order; totals required only when the innings has no OVER/BALL rows), OVER (per-over totals) and BALL (one delivery; file order wins over the over/ball columns — the server re-numbers). Detail level is inferred per innings: BALL rows ⇒ BALL, else OVER rows ⇒ OVER, else MATCH from the INNINGS totals. `META status=LIVE` marks an ongoing match — unclosed innings stay IN_PROGRESS and the crease state is seeded from the last BALL row, so the admin ball pad resumes exactly where the file left off. The parsed result funnels through the same pipeline as `PUT …/cricket-data` (validation, derivation, mirroring, cache busting). Row errors follow the schedule importer''s contract; 422 when nothing imports. The file is capped at 10 MB (413 beyond that).'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: CSV or Excel file (.csv, .xls, .xlsx).
      responses:
        '200':
          description: Import summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CricketUploadResult'
        '400':
          description: No file uploaded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: No file uploaded
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFoundMatch'
        '413':
          description: File exceeds the 10 MB upload cap.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: File too large
        '422':
          description: All rows failed validation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleUploadFailure'
  /polls:
    get:
      tags:
        - Polls
      operationId: pollsList
      summary: List polls for the public page
      description: Safe to call without credentials. When a `voterId` cookie or JWT is present, `hasVoted` / `votedOptionId` are populated per poll. Send `withCredentials` so the voter cookie round-trips.
      parameters:
        - name: filter
          in: query
          required: false
          description: '`latest` (ACTIVE, createdAt DESC), `popular` (ACTIVE, totalVotes DESC then createdAt DESC), `closed` (CLOSED + ACTIVE-past-endDate, endDate DESC then createdAt DESC). Unknown values → 400.'
          schema:
            type: string
            enum:
              - popular
              - latest
              - closed
            default: latest
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        '200':
          description: Paged polls matching the filter.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PollListResponse'
        '400':
          description: Unknown filter value.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Invalid filter
    post:
      tags:
        - Polls
      operationId: pollCreate
      security:
        - firebaseAuth: []
      summary: Create a poll (admin)
      description: '`options` is a flat array of plain strings; the backend assigns each a stable `id`. Defaults `status` to DRAFT so the poll is hidden until activated.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PollInput'
      responses:
        '201':
          description: Created (full Poll shape; totalVotes 0; options have ids).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Poll'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /polls/{id}:
    parameters:
      - $ref: '#/components/parameters/PollId'
    get:
      tags:
        - Polls
      operationId: pollGet
      summary: Fetch a poll by id
      description: Returns 404 for DRAFT polls or unknown ids.
      responses:
        '200':
          description: The poll.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Poll'
        '404':
          $ref: '#/components/responses/NotFoundPoll'
    put:
      tags:
        - Polls
      operationId: pollReplace
      security:
        - firebaseAuth: []
      summary: Replace a poll (admin)
      description: Options stay a flat string array. The backend preserves existing `options[].id`/`votes` for matching (case-insensitive) strings, assigns a fresh id (votes 0) to new strings, and drops options no longer present (destroying their votes).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PollInput'
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Poll'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFoundPoll'
    delete:
      tags:
        - Polls
      operationId: pollDelete
      security:
        - firebaseAuth: []
      summary: Delete a poll (admin)
      description: Also discards all of its votes and dedupe records.
      responses:
        '204':
          description: Deleted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFoundPoll'
  /polls/{id}/vote:
    parameters:
      - $ref: '#/components/parameters/PollId'
    post:
      tags:
        - Polls
      operationId: pollVote
      summary: Cast a vote on a poll
      description: 'Anonymous voting with best-effort dedupe (JWT > `voterId` cookie > IP+UA hash). On the first vote without a cookie, the backend mints one and returns it via `Set-Cookie: voterId=...; Max-Age=63072000; SameSite=Lax; HttpOnly; Secure`. The increment + dedupe-record MUST be atomic. Changing your vote is not supported in v1. A per-IP rate limit (~30/min) is recommended (429).'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PollVoteRequest'
      responses:
        '200':
          description: Updated poll (hasVoted true, votedOptionId set).
          headers:
            Set-Cookie:
              description: voterId cookie, set on the first vote from a given browser.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Poll'
        '400':
          description: Invalid optionId.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Invalid optionId
        '404':
          $ref: '#/components/responses/NotFoundPoll'
        '409':
          description: Poll is closed, or the voter has already voted.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/Error'
                  - $ref: '#/components/schemas/AlreadyVotedError'
              examples:
                closed:
                  value:
                    error: Poll is closed
                alreadyVoted:
                  value:
                    error: Already voted
                    votedOptionId: opt-2
        '429':
          description: Too many vote attempts (rate limited).
          headers:
            Retry-After:
              description: Seconds to wait before retrying.
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
