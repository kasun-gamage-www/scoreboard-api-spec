  responses:
    Unauthorized:
      description: 'Missing, malformed, expired or revoked Firebase ID token (`Authorization: Bearer`).'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: Unauthorized
    Forbidden:
      description: No token sent, or the authenticated account lacks the ADMIN privilege.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: Admin privileges required!
    NotFoundUser:
      description: No user exists for the supplied uid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: There is no user record corresponding to the provided identifier.
    NotFoundRoleAssignment:
      description: No role assignment exists for the supplied id.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: Role assignment not found
    Presign:
      description: Presigned upload details (folder fixed by the alias).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PresignResponse'
    NotFoundArticle:
