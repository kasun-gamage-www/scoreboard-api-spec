openapi: 3.1.0

info:
  title: Scoreboard API
  version: 1.0.0
  summary: Unified API for the Scoreboard sports platform (admin CMS + public site).
  description: |
    Consolidated OpenAPI specification for the Scoreboard platform, derived from the
    per-resource markdown specs under `Legacy/`. It covers content management
    (articles, clubs, players, teams, tournaments, venues, photos, videos, sponsors,
    other events), the generic `/matches` resource, sport-specific read surfaces
    (cricket & golf), polls, authentication, and the S3 media-presign contract.

    ## Base URL & the `/api` prefix
    The base URL is configured via the `API_BASE_URI` environment variable
    (example: `http://localhost:8081/api`). Endpoints are written here as bare
    resource paths (e.g. `/matches`) which compose onto the base URL.

    Every route is reachable **both with and without** an `/api` prefix
    (`/matches` ≡ `/api/matches`) — **except** the deprecated `/cric-scores`
    family, which is served **only** under the `/api` prefix and is not mirrored
    at the host root.

    ## Authentication
    Protected endpoints require a JWT sent in the **`x-access-token`** header
    (NOT `Authorization: Bearer …`). The token is issued by `POST /auth/signin1988`
    and `POST /auth/signup351`.

    Today, only media-presign / delete and the per-resource `/<resource>/upload`
    aliases (plus `POST /matches/upload-schedule`) are enforced in code. Resource
    CRUD is **not** protected in the current implementation — this is documented as
    an existing gap, not the intended long-term contract, and such routes SHOULD be
    locked behind `x-access-token` in production.

    ## Slugs
    Most resources are addressed by a backend-generated URL-friendly `slug`
    (not a numeric id). Sponsors are the exception and use an opaque `id`.
    Polls use a stable `id` (uuid or slug).

    ## Media flow (presign)
    Image/video assets are uploaded **directly browser → S3** via a short-lived
    presigned `PUT`. The API only signs the URL; file bytes never traverse the API
    server. Every presign response carries two URLs on different hosts: `uploadUrl`
    (the S3 PUT target) and `url` (the canonical public/CDN URL to persist on the
    resource).

    ## Error format
    All non-2xx responses use the project-wide error shape:
    `{ "error": "human-readable message", "code": "OPTIONAL_MACHINE_CODE" }`.
  contact:
    name: Scoreboard Platform
  license:
    name: Proprietary

servers:
  - url: "{API_BASE_URI}"
    description: Configurable API base. Default matches the local dev convention.
    variables:
      API_BASE_URI:
        default: http://localhost:8081/api
        description: >-
          Root of the API. May or may not include a trailing `/api` segment.
          All documented paths are reachable with and without an `/api` prefix
          except the deprecated `/cric-scores` family (which is `/api`-only).

tags:
  - name: Auth
    description: Sign-in / sign-up. Issues the `x-access-token` JWT.
  - name: Media
    description: S3 presign / delete contract and per-resource upload aliases.
  - name: Articles
    description: Editorial articles (news, match reports, features).
  - name: Clubs
    description: Sporting clubs.
  - name: Players
    description: Players (also created inline from the match form).
  - name: Teams
    description: Teams.
  - name: Tournaments
    description: Tournaments / competitions. Source of cricket-format inheritance.
  - name: Venues
    description: Venues (UAE-aware via the `emirate` enum).
  - name: Photos
    description: Public photo gallery entries.
  - name: Videos
    description: Videos (YouTube id or hosted file via `source`).
  - name: Sponsors
    description: Lean sponsor list (id-addressed; list/create/delete only).
  - name: Other Events
    description: Non-match calendar items (training, ceremonies, etc.).
  - name: Matches
    description: Generic cross-sport match resource (CRUD, featured flag, bulk import).
  - name: Polls
    description: Public reader polls + admin authoring.
  - name: Cricket Display
    description: Public read surfaces for cricket pages.
  - name: Golf Display
    description: Public read surfaces for golf pages.
  - name: Match Display (shared)
    description: Cross-sport public read surfaces (schedule, featured carousel).
  - name: Cricket Legacy
    description: Deprecated `/api/cric-scores` routes. Do not build new code against these.

paths:
  # ============================ AUTH ============================
  /auth/signin1988:
    post:
      tags: [Auth]
      operationId: authSignin
      summary: Exchange username + password for a JWT
      description: >-
        The obfuscated suffix `1988` is part of the canonical path and MUST NOT be
        normalised away; `/auth/signin` SHOULD return 404. The backend MUST return
        the same 401 shape whether the username is unknown or the password is wrong,
        to avoid leaking account existence.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SigninRequest" }
      responses:
        "200":
          description: Authenticated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SigninResponse" }
        "400":
          description: Missing credentials.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
              example: { error: "Missing credentials" }
        "401":
          description: Invalid credentials (identical shape regardless of cause).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
              example: { error: "Invalid credentials" }

  /auth/signup351:
    post:
      tags: [Auth]
      operationId: authSignup
      summary: Create a new account
      description: >-
        The obfuscated suffix `351` is part of the canonical path. The client sends a
        `passHash` (client-side hashed), but the backend MUST still apply its own
        server-side hash (e.g. bcrypt/argon2) before storing and MUST NOT store the
        value verbatim.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SignupRequest" }
      responses:
        "200":
          description: Account created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SignupResponse" }
        "400":
          description: Missing fields.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
              example: { error: "Missing fields" }
        "409":
          description: Username already taken.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
              example: { error: "Username already taken" }

  # ============================ MEDIA ============================
  /media/presign:
    post:
      tags: [Media]
      operationId: mediaPresign
      summary: Presign an S3 PUT for a direct browser upload
      description: >-
        Admin-only. Returns a short-lived presigned S3 `PUT` plus the canonical
        public URL to persist. The signature pins content-type and a max byte size,
        so S3 itself rejects oversize / content-type-swapped uploads.
      security:
        - accessToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PresignRequest" }
      responses:
        "200":
          description: Presigned upload details.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PresignResponse" }
        "400":
          description: Invalid contentType / folder / filename.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
              examples:
                contentType: { value: { error: "Invalid contentType" } }
                folder: { value: { error: "Invalid folder" } }
                filename: { value: { error: "Invalid filename" } }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /media:
    delete:
      tags: [Media]
      operationId: mediaDelete
      summary: Delete an uploaded object by key
      description: >-
        Admin-only. The backend MUST reject any `key` outside the `scoreboard/`
        prefix with 400, preventing deletion of arbitrary bucket objects.
      security:
        - accessToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MediaDeleteRequest" }
      responses:
        "204": { description: Deleted. }
        "400":
          description: Key outside the `scoreboard/` prefix.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
              example: { error: "Key outside scoreboard/ prefix" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /articles/upload:
    post:
      tags: [Media]
      operationId: articlesUpload
      summary: Presign alias (folder hard-coded to `articles`)
      description: Same shape as `/media/presign`; any client `folder` is ignored.
      security: [{ accessToken: [] }]
      requestBody: { $ref: "#/components/requestBodies/PresignAlias" }
      responses:
        "200": { $ref: "#/components/responses/Presign" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /clubs/upload:
    post:
      tags: [Media]
      operationId: clubsUpload
      summary: Presign alias (folder hard-coded to `clubs`)
      security: [{ accessToken: [] }]
      requestBody: { $ref: "#/components/requestBodies/PresignAlias" }
      responses:
        "200": { $ref: "#/components/responses/Presign" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /photos/upload:
    post:
      tags: [Media]
      operationId: photosUpload
      summary: Presign alias (folder hard-coded to `photos`)
      security: [{ accessToken: [] }]
      requestBody: { $ref: "#/components/requestBodies/PresignAlias" }
      responses:
        "200": { $ref: "#/components/responses/Presign" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /players/upload:
    post:
      tags: [Media]
      operationId: playersUpload
      summary: Presign alias (folder hard-coded to `players`)
      security: [{ accessToken: [] }]
