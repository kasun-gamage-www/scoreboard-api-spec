      properties:
        error:
          type: string
          example: All rows failed validation
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ScheduleRowError'
    CricketDetailLevel:
      type: string
      description: Granularity of the raw facts entered for an innings. BALL innings carry every delivery; OVER innings carry per-over totals; MATCH innings carry only final totals. Different innings of the same match may use different levels — admins enter what they have.
      enum:
        - MATCH
        - OVER
        - BALL
    CricketOverSummary:
      type: object
      description: Per-over totals for an OVER-level innings.
      required:
        - over
        - runs
      properties:
        over:
          type: integer
          minimum: 1
          description: 1-based over number.
        runs:
          type: integer
          minimum: 0
        wickets:
          type: integer
          minimum: 0
          maximum: 10
          default: 0
        bowler:
          type:
            - string
            - 'null'
          description: Optional lineup name; enables per-bowler attribution in analysis.
    CricketExtras:
      type: object
      description: 'Extras conceded on one delivery. WIDE and NO_BALL are illegal deliveries and do not advance the legal-ball count; `runs` is the total extras awarded on the ball, including the mandatory 1 for WIDE/NO_BALL (a wide four is `{type: WIDE, runs: 5}`). Byes/leg-byes off a no-ball are entered as NO_BALL with the combined runs.'
      required:
        - type
        - runs
      properties:
        type:
          type: string
          enum:
            - WIDE
            - NO_BALL
            - BYE
            - LEG_BYE
            - PENALTY
        runs:
          type: integer
          minimum: 1
    CricketWicket:
      type: object
      description: Dismissal recorded on one delivery. `playerOut` is a lineup name — usually the striker, but may be the non-striker (run-outs). RETIRED_HURT does not count towards the ten-wicket limit.
      required:
        - type
        - playerOut
      properties:
        type:
          type: string
          enum:
            - BOWLED
            - CAUGHT
            - LBW
            - RUN_OUT
            - STUMPED
            - HIT_WICKET
            - RETIRED_HURT
            - RETIRED_OUT
            - OBSTRUCTING_FIELD
            - TIMED_OUT
        playerOut:
          type: string
          description: Lineup name of the dismissed batter.
        fielder:
          type:
            - string
            - 'null'
          description: Catcher / thrower / stumper for CAUGHT, RUN_OUT and STUMPED; null otherwise.
    CricketDelivery:
      type: object
      description: 'One delivery — raw facts only. `over`, `ballInOver`, `isLegal` and `enteredAt` are server-assigned from the delivery sequence and are read-only (never sent by clients). Striker/non-striker are raw facts: the admin UI suggests strike rotation (odd runs, end of over) but the server stores what was sent, because retirements and batters crossing on a catch break pure derivation.'
      required:
        - striker
        - nonStriker
        - bowler
        - runsOffBat
      properties:
        over:
          type: integer
          minimum: 0
          readOnly: true
          description: 0-based over index, server-assigned from the legal-ball sequence.
        ballInOver:
          type: integer
          minimum: 1
          maximum: 6
          readOnly: true
          description: Legal-ball position within the over, server-assigned.
        striker:
          type: string
          description: Lineup name facing the ball.
        nonStriker:
          type: string
          description: Lineup name at the non-striker's end.
        bowler:
          type: string
          description: Lineup name bowling.
        runsOffBat:
          type: integer
          minimum: 0
          maximum: 8
          description: Runs credited to the striker (overthrows allowed, hence up to 8).
        extras:
          oneOf:
            - $ref: '#/components/schemas/CricketExtras'
            - type: 'null'
        wicket:
          oneOf:
            - $ref: '#/components/schemas/CricketWicket'
            - type: 'null'
        isLegal:
          type: boolean
          readOnly: true
          description: Server-derived — false iff `extras.type` is WIDE or NO_BALL.
        enteredAt:
          allOf:
            - $ref: '#/components/schemas/Timestamp'
          readOnly: true
    CricketInningsData:
      type: object
      description: Raw facts for one innings, in order of play. Exactly one of `totals` / `overSummaries` / `deliveries` is authoritative depending on `detailLevel` (MATCH / OVER / BALL respectively); for OVER and BALL innings the totals are server-derived and never stored here.
      required:
        - seq
        - battingTeam
        - detailLevel
      properties:
        seq:
          type: integer
          minimum: 1
          description: 1-based order of play; must be contiguous from 1 across the match.
        battingTeam:
          type: string
          enum:
            - HOME
            - AWAY
        detailLevel:
          $ref: '#/components/schemas/CricketDetailLevel'
        state:
          type: string
          enum:
            - IN_PROGRESS
            - COMPLETED
            - DECLARED
          default: IN_PROGRESS
        totals:
          oneOf:
            - type: object
              required:
                - runs
              properties:
                runs:
                  type: integer
                  minimum: 0
                wickets:
                  type: integer
                  minimum: 0
                  maximum: 10
                overs:
                  type:
                    - number
                    - 'null'
                  description: X.Y with Y in 0..5 (balls), or total balls for HUNDRED.
            - type: 'null'
          description: Authoritative only when `detailLevel` is MATCH.
        overSummaries:
          type: array
          description: OVER-level innings only.
          items:
            $ref: '#/components/schemas/CricketOverSummary'
        deliveries:
          type: array
          description: BALL-level innings only, in delivery order.
          items:
            $ref: '#/components/schemas/CricketDelivery'
        currentState:
          oneOf:
            - type: object
              properties:
                striker:
                  type: string
                nonStriker:
                  type: string
                bowler:
                  type: string
            - type: 'null'
          description: Live-entry crease pointer for a BALL-level innings in progress; lets the admin ball pad re-hydrate exactly after a refresh or a 409.
        followOn:
          type: boolean
          default: false
          description: TEST only.
    CricketMatchData:
      type: object
      description: Raw cricket entry data for one match (admin read-back). This plus the Match document is the complete user-entered fact set — the server derives every public display surface (summary card, scorecard, commentary, analysis, live) from it on each write; nothing derived is stored here. A cricket match with no CricketMatchData document is implicitly MATCH-level, sourced from `Match.details`.
      required:
        - matchSlug
        - format
        - innings
      properties:
        matchSlug:
          type: string
          readOnly: true
        format:
          allOf:
            - $ref: '#/components/schemas/CricketFormat'
          description: Required here — null is not allowed once cricket data exists.
        oversLimit:
          type:
            - integer
            - 'null'
          description: Per-innings limit. Defaults by format (T20=20, OD=50, T10=10, TEST=null, HUNDRED=100 *balls*); admin-overridable for rain-shortened matches.
        toss:
          oneOf:
            - type: object
              required:
                - wonBy
                - decision
              properties:
                wonBy:
                  type: string
                  enum:
                    - HOME
                    - AWAY
                decision:
                  type: string
                  enum:
                    - BAT
                    - BOWL
            - type: 'null'
        playerOfMatch:
          type:
            - string
            - 'null'
          description: Admin judgment call (not derivable). When null the server derives it from the MVP totals.
        resultNote:
          type:
            - string
            - 'null'
          description: Optional result-label override (e.g. "Match abandoned").
        innings:
          type: array
          items:
            $ref: '#/components/schemas/CricketInningsData'
        createdAt:
          allOf:
            - $ref: '#/components/schemas/Timestamp'
          readOnly: true
        updatedAt:
          allOf:
            - $ref: '#/components/schemas/Timestamp'
          readOnly: true
          description: Editors compare this against their loaded copy to warn about concurrent edits before a bulk PUT (last writer wins).
    CricketLiveTeam:
      type: object
      properties:
        name:
          type: string
        score:
          type: string
        overs:
          type: string
        batFirst:
          type: boolean
    CricketLiveBatter:
      type: object
      properties:
        name:
          type: string
        onStrike:
          type: boolean
        runs:
          type: integer
        balls:
          type: integer
    CricketLiveBowler:
      type: object
      properties:
        name:
          type: string
        overs:
          type: number
        maidens:
          type: integer
        runs:
          type: integer
        wickets:
          type: integer
    CricketLive:
      type: object
      properties:
        slug:
          type: string
        status:
          type: string
          example: LIVE
        homeTeam:
          $ref: '#/components/schemas/CricketLiveTeam'
        awayTeam:
          $ref: '#/components/schemas/CricketLiveTeam'
        target:
          type:
            - integer
            - 'null'
          description: Null in 1st innings.
        required:
          oneOf:
            - type: object
              properties:
                runs:
                  type: integer
                balls:
                  type: integer
                runRate:
                  type: number
            - type: 'null'
          description: Null in 1st innings.
        currentBatters:
          type: array
          items:
            $ref: '#/components/schemas/CricketLiveBatter'
        currentBowler:
          $ref: '#/components/schemas/CricketLiveBowler'
        lastBalls:
          type: array
          description: Most recent over, newest right.
          items:
            type: string
        lastUpdated:
          type: string
          format: date-time
    CricketMatchDataResponse:
      type: object
      description: Envelope returned by the cricket-data GET / PUT / PATCH operations. `live` is the fresh server-derived live snapshot (null unless the match is LIVE) — the admin editor re-syncs its pad state from it after every write, keeping the server authoritative.
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/CricketMatchData'
        live:
          oneOf:
            - $ref: '#/components/schemas/CricketLive'
            - type: 'null'
    CricketMatchDataInput:
      type: object
      description: Create-or-replace payload for a match's raw cricket data (PUT). Full replacement, not a merge. Raw facts only — never send server-assigned fields (`over`, `ballInOver`, `isLegal`, `enteredAt`, timestamps) or any derived value. Used by the admin match setup, the over-by-over save, and the CSV importer.
      required:
        - format
        - innings
      properties:
        format:
          allOf:
            - $ref: '#/components/schemas/CricketFormat'
          description: Required; null not allowed.
        oversLimit:
          type:
            - integer
            - 'null'
          description: Omit/null for format default; set for rain-shortened matches.
        toss:
          oneOf:
            - type: object
              required:
                - wonBy
                - decision
              properties:
                wonBy:
                  type: string
                  enum:
                    - HOME
                    - AWAY
                decision:
                  type: string
                  enum:
                    - BAT
                    - BOWL
            - type: 'null'
        playerOfMatch:
          type:
            - string
            - 'null'
        resultNote:
          type:
            - string
            - 'null'
        innings:
          type: array
          description: '`seq` must be contiguous from 1. Player names must resolve against the match lineups — unresolvable names are rejected (400) for BALL-level innings and reported as warnings for OVER-level.'
          items:
            $ref: '#/components/schemas/CricketInningsData'
    CricketBallInput:
      type: object
      description: 'Append one delivery to a BALL-level innings. `expectedBallCount` is the client''s count of deliveries already stored for that innings — the optimistic concurrency guard: a mismatch returns 409 with the server''s authoritative count and the client re-hydrates. `nextState` is the client''s suggested crease state after this ball (strike rotation applied); the server stores it as the innings'' `currentState`.'
      required:
        - inningsSeq
        - expectedBallCount
        - striker
        - nonStriker
        - bowler
        - runsOffBat
      properties:
        inningsSeq:
          type: integer
          minimum: 1
        expectedBallCount:
          type: integer
          minimum: 0
        striker:
          type: string
        nonStriker:
          type: string
        bowler:
          type: string
        runsOffBat:
          type: integer
          minimum: 0
          maximum: 8
        extras:
          oneOf:
            - $ref: '#/components/schemas/CricketExtras'
            - type: 'null'
        wicket:
          oneOf:
            - $ref: '#/components/schemas/CricketWicket'
            - type: 'null'
        nextState:
          oneOf:
            - type: object
              properties:
                striker:
                  type: string
                nonStriker:
                  type: string
                bowler:
                  type: string
            - type: 'null'
    CricketBallResponse:
      type: object
      description: Result of a ball append/undo. `ballCount` is the innings' authoritative delivery count after the operation — the client's next `expectedBallCount`.
      required:
        - ballCount
      properties:
        ballCount:
          type: integer
          minimum: 0
        live:
          oneOf:
            - $ref: '#/components/schemas/CricketLive'
            - type: 'null'
          description: Fresh server-derived snapshot to reconcile the pad against.
    CricketBallConflict:
      type: object
      description: 'Optimistic-concurrency conflict (409): the innings'' delivery count moved since the client last synced — another editor tab or a double-tap. The client must re-hydrate via `GET …/cricket-data` and retry from the returned state; nothing was written.'
      required:
        - error
        - ballCount
      properties:
        error:
          type: string
          example: Ball count mismatch
        ballCount:
          type: integer
          description: The server's authoritative delivery count for the innings.
    CricketStatePatch:
      type: object
      description: Partial live-state update; send any subset of the fields. `matchStatus` transitions the parent Match (COMPLETED finalises the result label and schedules live-snapshot eviction). `startInnings` appends the next innings; `closeInnings` marks one COMPLETED or DECLARED; `currentState` repoints the crease of the innings currently in progress. Every accepted patch re-derives the display surfaces and busts the public cricket caches.
      properties:
        toss:
          oneOf:
            - type: object
              required:
                - wonBy
                - decision
              properties:
                wonBy:
                  type: string
                  enum:
                    - HOME
                    - AWAY
                decision:
                  type: string
                  enum:
                    - BAT
                    - BOWL
            - type: 'null'
        playerOfMatch:
          type:
            - string
            - 'null'
        resultNote:
          type:
            - string
            - 'null'
        matchStatus:
          $ref: '#/components/schemas/MatchStatus'
        startInnings:
          type: object
          required:
            - battingTeam
            - detailLevel
          properties:
            battingTeam:
              type: string
              enum:
                - HOME
                - AWAY
            detailLevel:
              $ref: '#/components/schemas/CricketDetailLevel'
            striker:
              type: string
              description: Opening batter on strike (BALL level).
            nonStriker:
              type: string
            bowler:
              type: string
              description: Opening bowler (BALL level).
        closeInnings:
          type: object
          required:
            - seq
            - state
          properties:
            seq:
              type: integer
              minimum: 1
            state:
              type: string
              enum:
                - COMPLETED
                - DECLARED
        currentState:
          type: object
          description: Applies to the innings currently IN_PROGRESS.
          properties:
            striker:
              type: string
            nonStriker:
              type: string
            bowler:
              type: string
    CricketUploadResult:
      type: object
      description: Cricket CSV import summary. Same row-error contract as the schedule importer (`errors[].row` is the spreadsheet row number).
      required:
