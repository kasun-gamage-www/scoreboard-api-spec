      summary: Delete a club
      responses:
        "204": { description: Deleted. }

  # ============================ PLAYERS ============================
  /players:
    get:
      tags: [Players]
      operationId: playersList
      summary: List players (optional name search)
      parameters:
        - $ref: "#/components/parameters/Search"
      responses:
        "200":
          description: Players (filtered by `search` when provided).
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Player" }
